<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>MEPL — Formulario de Respuestas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --brand:#0d3b78; --brand-mid:#1a56b0; --brand-light:#c7d9f5; --brand-xlight:#eef4ff; --brand-dark:#071e40;
    --accent:#f59e0b; --accent-light:#fffbeb;
    --success:#16a34a; --success-light:#f0fdf4;
    --danger:#dc2626; --danger-light:#fef2f2;
    --warn:#d97706; --warn-light:#fffbeb;
    --bg:#f0f4fa; --surface:#fff;
    --border:#e2e8f0; --border-mid:#cbd5e1;
    --muted:#94a3b8; --text-sec:#64748b; --text:#0f172a;
    --font:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
    --r-sm:6px; --r-md:12px; --r-lg:16px; --r-xl:20px; --r-full:999px;
    --sh-xs:0 1px 3px rgba(0,0,0,.06);
    --sh-sm:0 2px 12px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.04);
    --sh-md:0 6px 24px rgba(0,0,0,.1),0 2px 8px rgba(0,0,0,.05);
    --sh-lg:0 12px 40px rgba(0,0,0,.14),0 4px 12px rgba(0,0,0,.07);
    --t-fast:140ms ease; --t-med:220ms ease;
  }
  html{font-size:16px;-webkit-tap-highlight-color:transparent}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}

  /* ── HEADER ── */
  header{
    position:sticky;top:0;z-index:200;
    background:linear-gradient(160deg,var(--brand-dark) 0%,var(--brand) 55%,var(--brand-mid) 100%);
    border-bottom:1px solid rgba(255,255,255,0.08);
    display:flex;align-items:center;padding:0 20px;gap:14px;height:60px;
    box-shadow:0 4px 20px rgba(7,30,64,0.45);
  }
  .logo-wrap{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .logo-badge{background:var(--accent);color:#fff;font-family:var(--mono);font-size:.75rem;font-weight:600;padding:4px 10px;border-radius:var(--r-full);letter-spacing:.06em}
  .logo-sep{width:1px;height:20px;background:rgba(255,255,255,0.2)}
  .logo-text{font-size:.8rem;font-weight:500;color:rgba(255,255,255,0.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
  #header-mes{display:none;background:rgba(255,255,255,0.15);color:#fff;font-family:var(--mono);font-size:.72rem;font-weight:600;padding:4px 12px;border-radius:var(--r-full);letter-spacing:.05em;white-space:nowrap;border:1px solid rgba(255,255,255,0.2)}
  .btn-header{display:none;align-items:center;gap:5px;padding:7px 14px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:var(--r-full);color:rgba(255,255,255,0.9);font-family:var(--font);font-size:.78rem;font-weight:500;cursor:pointer;transition:background var(--t-fast);white-space:nowrap}
  .btn-header:hover{background:rgba(255,255,255,0.22)}
  .btn-header:active{transform:scale(0.97)}

  /* ── ADMIN BAR ── */
  .admin-bar{display:none;align-items:center;gap:10px;padding:10px 20px;background:#1a0a3d;border-bottom:1px solid rgba(167,139,250,0.2);font-size:.8rem;flex-wrap:wrap}
  .admin-bar strong{color:#fbbf24;font-weight:600}
  .admin-bar span{color:rgba(255,255,255,0.5)}

  /* ── LAYOUT ── */
  .container{max-width:680px;margin:0 auto;padding:20px 16px 56px}

  /* ── STEPPER ── */
  .paso-indicator,.progress-wrap{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--r-xl);padding:20px 16px;
    margin-bottom:16px;box-shadow:var(--sh-xs);
    position:relative;
  }
  /* línea de fondo entre pasos */
  .paso-indicator::before,.progress-wrap::before{
    content:'';position:absolute;
    top:29px;left:calc(16px + 36px);
    right:calc(16px + 36px);
    height:2px;background:var(--border-mid);z-index:0;
  }
  .paso,.progress-step{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;
    position:relative;z-index:1;
  }
  /* círculo */
  .paso-circle{
    width:30px;height:30px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:.78rem;font-weight:700;font-family:var(--mono);
    border:2px solid var(--border-mid);background:var(--surface);color:var(--muted);
    position:relative;z-index:2;transition:all var(--t-med);flex-shrink:0;
  }
  .paso-label{font-size:.64rem;font-weight:600;color:var(--muted);text-align:center;line-height:1.2;transition:color var(--t-med)}
  .paso.activo .paso-circle{background:var(--brand);border-color:var(--brand);color:#fff;box-shadow:0 0 0 4px rgba(13,59,120,0.18)}
  .paso.activo .paso-label{color:var(--brand);font-weight:700}
  .paso.completo .paso-circle{background:var(--success);border-color:var(--success);color:#fff}
  .paso.completo .paso-label{color:var(--success)}
  /* línea progreso encima */
  .paso.completo::after{
    content:'';position:absolute;top:14px;
    left:50%;right:-50%;height:2px;
    background:var(--success);z-index:1;
  }
  .paso:last-child::after{display:none}

  /* ── CARD BASE ── */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:24px;margin-bottom:14px;box-shadow:var(--sh-sm)}
  .card-title{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
  .card h2{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:18px;padding-bottom:13px;border-bottom:1px solid var(--border)}

  /* ── INTRO / BIENVENIDA ── */
  .intro-strip{background:linear-gradient(135deg,var(--brand-dark) 0%,var(--brand) 60%,var(--brand-mid) 100%);border-radius:var(--r-xl);padding:28px 24px;color:#fff;margin-bottom:14px;position:relative;overflow:hidden}
  .intro-strip::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.05)}
  .intro-eyebrow{font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px}
  .intro-title{font-size:1.4rem;font-weight:700;margin-bottom:4px}
  .intro-sub{font-size:.85rem;color:rgba(255,255,255,0.7)}

  /* ── CARD ESTABLECIMIENTO (generada por JS con clase .card-establecimiento) ── */
  .card-establecimiento{
    background:linear-gradient(160deg,var(--brand-dark) 0%,var(--brand) 65%,#1a5bb5 100%);
    border-radius:var(--r-xl);padding:20px;margin-bottom:14px;color:#fff;
    box-shadow:0 6px 24px rgba(7,30,64,0.35);position:relative;overflow:hidden;
  }
  .card-establecimiento::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.05)}
  .ce-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .ce-badge-mepl{font-size:.7rem;font-weight:700;background:rgba(255,255,255,0.15);color:#fff;padding:3px 12px;border-radius:var(--r-full);border:1px solid rgba(255,255,255,0.2);font-family:var(--mono)}
  .ce-badge-mes{font-size:.7rem;font-weight:700;background:var(--accent);color:#1a1a1a;padding:3px 10px;border-radius:var(--r-full);font-family:var(--mono)}
  .ce-sap{font-size:.7rem;color:rgba(255,255,255,0.55);margin-bottom:2px}
  .ce-nums{display:flex;align-items:center;gap:16px;margin-bottom:14px}
  .ce-num-item{}
  .ce-num-val{font-size:1.5rem;font-weight:700;font-family:var(--mono);line-height:1}
  .ce-num-label{font-size:.65rem;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
  .ce-divider{width:1px;height:40px;background:rgba(255,255,255,0.2)}
  .ce-dir-wrap{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .ce-icon-wrap{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem}
  .ce-eyebrow{font-size:.68rem;color:rgba(255,255,255,0.55);margin-bottom:3px}
  .ce-domicilio{font-size:1.15rem;font-weight:700;line-height:1.2}
  .ce-ciudad{font-size:.82rem;color:rgba(255,255,255,0.7);margin-top:2px}
  .ce-sep{height:1px;background:rgba(255,255,255,0.15);margin:14px 0}
  .ce-fecha-wrap{display:flex;align-items:center;gap:12px}
  .ce-fecha-label{font-size:.68rem;color:rgba(255,255,255,0.55);margin-bottom:3px}
  .ce-fecha-val{font-size:.95rem;font-weight:700;font-family:var(--mono)}
  .ce-fecha-arrow{color:rgba(255,255,255,0.5);font-size:1.1rem;margin:0 4px}

  /* ── SECCIÓN TIPO ── */
  .tipo-seccion{font-size:.82rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--brand);background:var(--brand-xlight);border:1.5px solid var(--brand-light);padding:8px 16px;border-radius:var(--r-full);margin-bottom:16px;display:inline-flex;align-items:center;gap:6px}

  /* ── BARRA PROGRESO TAREAS ── */
  .progreso-tareas{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:18px 20px;margin-bottom:14px;box-shadow:var(--sh-xs)}
  .progreso-tareas-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .progreso-tareas-label{font-size:.84rem;font-weight:600;color:var(--text)}
  .progreso-tareas-num{font-family:var(--mono);font-size:.84rem;font-weight:700;color:var(--brand)}
  .progreso-bar-wrap{background:var(--border);border-radius:var(--r-full);height:6px;overflow:hidden}
  .progreso-bar-fill{height:100%;border-radius:var(--r-full);background:linear-gradient(90deg,var(--brand-mid),var(--success));transition:width .4s ease}
  .progreso-bar-fill.completo{background:var(--success)}
  .progreso-tareas-estado{font-size:.74rem;color:var(--muted);margin-top:8px}

  /* ── TAREA CARD ── */
  .tarea-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-xl);overflow:hidden;margin-bottom:12px;box-shadow:var(--sh-sm);transition:box-shadow var(--t-med),border-color var(--t-med)}
  .tarea-card:hover{box-shadow:var(--sh-md);border-color:var(--border-mid)}
  .tarea-header{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;border-bottom:1px solid var(--border);background:var(--bg)}
  .clave{font-family:var(--mono);font-size:.7rem;font-weight:600;background:var(--brand);color:#fff;padding:4px 10px;border-radius:var(--r-full);flex-shrink:0;letter-spacing:.03em}
  .texto{font-weight:700;font-size:.9rem;color:var(--text);flex:1}
  .contador{font-family:var(--mono);font-size:.68rem;color:var(--muted);background:var(--border);padding:3px 9px;border-radius:var(--r-full);flex-shrink:0}
  /* Badge estado tarea */
  .tarea-badge-estado{font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:var(--r-full);flex-shrink:0;white-space:nowrap}
  .tarea-badge-pendiente{background:#fef9c3;color:#92400e;border:1px solid #fde68a}
  .tarea-badge-completo{background:#dcfce7;color:var(--success);border:1px solid #86efac}
  .tarea-rutina{padding:12px 16px;font-size:.8rem;color:var(--text-sec);line-height:1.6;border-bottom:1px solid var(--border);background:#fafbfd}
  .tarea-respuesta{padding:14px 16px}
  .tarea-respuesta > label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px}

  /* ── RESPUESTA OPCIONES ── */
  .respuesta-opciones{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
  .opcion-btn{padding:9px 16px;border:1.5px solid var(--border-mid);border-radius:var(--r-md);background:var(--surface);font-family:var(--font);font-size:.82rem;font-weight:600;cursor:pointer;color:var(--text-sec);transition:all var(--t-fast);min-height:44px;-webkit-tap-highlight-color:transparent}
  .opcion-btn:hover{border-color:var(--brand-mid);color:var(--brand);background:var(--brand-xlight)}
  .opcion-btn:active{transform:scale(0.97)}
  .opcion-btn.selected{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 2px 8px rgba(13,59,120,0.25)}
  .opcion-btn.selected-na{background:var(--bg);color:var(--text-sec);border-color:var(--border-mid)}
  .opcion-btn.selected-informe{background:#0e7490;color:#fff;border-color:#0e7490}

  /* ── MES SELECTOR ── */
  .mes-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .mes-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);padding:28px 16px 24px;text-align:center;cursor:pointer;transition:all var(--t-med)}
  .mes-card:hover{border-color:var(--brand-mid);transform:translateY(-3px);box-shadow:var(--sh-md);background:var(--brand-xlight)}
  .mes-card:active{transform:translateY(-1px)}
  .mes-icono{font-size:2.2rem;margin-bottom:10px;display:block}
  .mes-nombre{font-size:1.15rem;font-weight:700;color:var(--brand)}
  .mes-anio{font-size:.75rem;color:var(--muted);font-family:var(--mono);margin-top:4px}

  /* ── MODO GRID ── */
  .modo-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modo-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);padding:22px 18px;cursor:pointer;transition:all var(--t-med);display:flex;flex-direction:column;gap:8px}
  .modo-card:hover{border-color:var(--brand-mid);background:var(--brand-xlight);transform:translateY(-2px);box-shadow:var(--sh-md)}
  .modo-card:active{transform:translateY(0)}
  .modo-icono{font-size:1.7rem}
  .modo-titulo{font-size:.95rem;font-weight:700;color:var(--brand)}
  .modo-desc{font-size:.78rem;color:var(--text-sec);line-height:1.45}

  /* ── TIPOS ── */
  .tipos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:18px}
  .tipo-card{display:flex;align-items:center;gap:8px;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);cursor:pointer;font-size:.84rem;font-weight:600;color:var(--text-sec);background:var(--surface);transition:all var(--t-fast)}
  .tipo-card:hover{border-color:var(--brand-mid);background:var(--brand-xlight);color:var(--brand);transform:translateY(-1px);box-shadow:var(--sh-sm)}
  .tipo-icono{font-size:1.15rem;flex-shrink:0}

  /* ── BUSCAR ── */
  .buscar-wrap,.buscar-colegio-wrap{position:relative;margin-bottom:14px}
  .buscar-wrap input,.buscar-colegio-wrap input{width:100%;padding:12px 14px 12px 42px !important;border:1.5px solid var(--border-mid);border-radius:var(--r-md);font-size:.92rem;font-family:var(--font);background:var(--surface);color:var(--text);transition:border-color var(--t-fast),box-shadow var(--t-fast);-webkit-appearance:none;box-sizing:border-box}
  .buscar-wrap input:focus,.buscar-colegio-wrap input:focus{outline:none;border-color:var(--brand-mid);box-shadow:0 0 0 3px rgba(13,59,120,0.12);background:#fff}
  .buscar-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;color:var(--muted);pointer-events:none;z-index:2;line-height:1}

  /* ── COLEGIOS ── */
  .colegios-grid{display:flex;flex-direction:column;gap:7px;max-height:440px;overflow-y:auto;padding-right:4px}
  .colegios-grid::-webkit-scrollbar{width:4px}
  .colegios-grid::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:4px}
  .colegio-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--r-md);cursor:pointer;background:var(--surface);transition:all var(--t-fast)}
  .colegio-card:hover{border-color:var(--brand-mid);background:var(--brand-xlight);transform:translateX(3px)}
  .colegio-icono{font-size:1.25rem;flex-shrink:0}
  .colegio-nombre{flex:1;font-size:.88rem;font-weight:600;color:var(--text)}
  .colegio-flecha{color:var(--muted);font-size:1.1rem;transition:transform var(--t-fast)}
  .colegio-card:hover .colegio-flecha{transform:translateX(3px);color:var(--brand-mid)}

  /* ── HOJAS ── */
  .hoja-item,.colegio-tipo-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border:1.5px solid var(--border);border-radius:var(--r-md);margin-bottom:8px;cursor:pointer;background:var(--surface);transition:all var(--t-fast)}
  .hoja-item:hover,.colegio-tipo-item:hover{border-color:var(--brand-mid);background:var(--brand-xlight);box-shadow:var(--sh-sm);transform:translateY(-1px)}
  .hoja-item.realizada,.colegio-tipo-item.realizada{border-color:#86efac;background:var(--success-light);cursor:default}
  .hoja-item.realizada:hover,.colegio-tipo-item.realizada:hover{transform:none;box-shadow:none}
  .hoja-tipo{font-weight:700;font-size:.9rem;color:var(--text)}
  .hoja-info{font-size:.76rem;color:var(--muted);margin-top:3px;font-family:var(--mono)}
  .hoja-badge{background:var(--brand-light);color:var(--brand-mid);font-size:.72rem;font-weight:700;padding:5px 12px;border-radius:var(--r-full);white-space:nowrap;flex-shrink:0}
  .badge-realizada{background:#dcfce7;color:var(--success)}

  /* ── ORDEN HEADER (legacy, por si algún render lo usa) ── */
  .orden-header{background:linear-gradient(160deg,var(--brand-dark) 0%,var(--brand) 65%,#1a5bb5 100%);border-radius:var(--r-xl);padding:20px;margin-bottom:16px;color:#fff;box-shadow:0 6px 24px rgba(7,30,64,0.35)}
  .orden-header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:10px;flex-wrap:wrap}
  .orden-num{font-family:var(--mono);font-size:1.4rem;font-weight:500;letter-spacing:.04em;line-height:1}
  .orden-badge{font-size:.7rem;font-weight:700;background:var(--accent);color:#fff;padding:4px 12px;border-radius:var(--r-full);font-family:var(--mono);letter-spacing:.04em;white-space:nowrap}
  .orden-dom{font-size:.88rem;color:rgba(255,255,255,0.82);margin-bottom:14px}
  .orden-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;border-top:1px solid rgba(255,255,255,0.12);padding-top:14px}
  .orden-meta-item .meta-label,.orden-meta-item span{display:block;font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,0.5);margin-bottom:3px}
  .orden-meta-item strong{font-family:var(--mono);font-size:.8rem;font-weight:500;color:rgba(255,255,255,0.92)}
  .orden-tipo-label{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;font-weight:700;color:var(--brand);background:var(--brand-xlight);border:1.5px solid var(--brand-light);padding:7px 14px;border-radius:var(--r-sm);margin-bottom:16px}

  /* ── FORMS ── */
  label{display:block;font-size:.78rem;font-weight:600;color:var(--text-sec);margin-bottom:7px}
  input[type="text"],textarea,select{width:100%;padding:11px 14px;border:1.5px solid var(--border-mid);border-radius:var(--r-md);font-size:.92rem;font-family:var(--font);background:var(--surface);color:var(--text);transition:border-color var(--t-fast),box-shadow var(--t-fast);-webkit-appearance:none}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--brand-mid);box-shadow:0 0 0 3px rgba(13,59,120,0.12);background:#fff}
  textarea{min-height:88px;resize:vertical;line-height:1.5}
  .firmante{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .dates{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  /* ── BOTONES ── */

<script>
// ── Año dinámico ─────────────────────────────────────────────
const ANIO = new Date().getFullYear();

// ── Edge Function — backend seguro (API key oculta en servidor) ─
const API_URL = "https://zynvptlesftdpyijxvpv.supabase.co/functions/v1/mepl-api";

// ── detectar modo admin ───────────────────────────────────────
const IS_ADMIN = new URLSearchParams(window.location.search).get("admin") === "true";
if (IS_ADMIN) document.getElementById("admin-bar").style.display = "flex";

// ── Logging de errores en Supabase ───────────────────────
async function logError(mensaje, pantalla = "") {
  try {
    await fetch(`${API_URL}?tabla=errores_log`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify([{
        mensaje:     String(mensaje).slice(0, 500),
        pantalla:    pantalla,
        dispositivo: navigator.userAgent.slice(0, 200),
        url:         window.location.href
      }])
    });
  } catch (_) { /* silencioso — no generar loop de errores */ }
}

// ── Logging de errores ───────────────────────────────────────
async function logError(mensaje, pantalla) {
  try {
    const url = new URL(API_URL);
    url.searchParams.set("tabla", "errores_log");
    await fetch(url.toString(), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify([{
        mensaje:    String(mensaje).slice(0, 500),
        pantalla:   pantalla || "",
        dispositivo: navigator.userAgent.slice(0, 200),
        url:        window.location.href
      }])
    });
  } catch (_) { /* silencioso — no romper si falla el log */ }
}

// ── fetch con timeout y reintentos ───────────────────────────
async function fetchConTimeout(url, opciones = {}, timeoutMs = 10000, reintentos = 2) {
  let ultimoError;
  for (let intento = 0; intento <= reintentos; intento++) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const res = await fetch(url, { ...opciones, signal: controller.signal });
      clearTimeout(timer);
      return res;
    } catch (e) {
      clearTimeout(timer);
      ultimoError = e.name === "AbortError"
        ? new Error("Sin conexión — la solicitud tardó demasiado. Verificá tu señal e intentá de nuevo.")
        : new Error("Error de red. Verificá tu conexión a internet.");
      if (intento < reintentos) await new Promise(r => setTimeout(r, 1000 * (intento + 1)));
    }
  }
  throw ultimoError;
}

async function sbGet(tabla, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.set("tabla", tabla);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetchConTimeout(url.toString());
  if (!res.ok) throw new Error("Error al leer datos (" + res.status + "). Intentá de nuevo.");
  return res.json();
}

async function sbPost(tabla, body) {
  const url = new URL(API_URL);
  url.searchParams.set("tabla", tabla);
  const res = await fetchConTimeout(url.toString(), {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error("Error al guardar (" + res.status + "). Intentá de nuevo.");
  return { ok: true };
}

async function sbPatch(tabla, params, body) {
  console.warn("sbPatch no disponible via Edge Function");
  return { ok: true };
}

async function sbDelete(tabla, params) {
  const url = new URL(API_URL);
  url.searchParams.set("tabla", tabla);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetchConTimeout(url.toString(), { method: "DELETE" });
  if (!res.ok) throw new Error("Error al eliminar (" + res.status + "). Intentá de nuevo.");
  return { ok: true };
}


function showToast(msg, tipo = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast " + tipo;
  t.style.display = "block";
  t.style.opacity = "1";
  setTimeout(() => {
    t.style.opacity = "0";
    setTimeout(() => { t.style.display = "none"; }, 400);
  }, 3000);
}
// helper: reemplaza innerHTML Y saca la clase loading del contenedor
function setContenido(id, html) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = '';
  el.innerHTML = html;
}
async function getColegios() {
  const data = await sbGet("colegios_hojas", { select: "domicilio", mes: `eq.${estado.mes}` });
  const colegios = [...new Set(data.map(r => r.domicilio).filter(Boolean))].sort();
  return { ok: true, colegios };
}

async function getHojas(domicilio) {
  const data = await sbGet("colegios_hojas", {
    select: "orden,orden_principal,texto_breve,fecha_fin",
    domicilio: `eq.${domicilio}`,
    mes: `eq.${estado.mes}`
  });

  const hojas = {};
  for (const r of data) {
    const key = r.orden_principal && r.orden_principal !== r.orden
                  ? r.orden_principal : r.orden;
    if (!hojas[key]) {
      hojas[key] = { ordenPpal: key, tipo: r.texto_breve, fechaFin: r.fecha_fin, ordenes: [] };
    }
    if (!hojas[key].ordenes.includes(r.orden)) hojas[key].ordenes.push(r.orden);
  }

  let ordenesRespondidas = new Set();
  const respData = await sbGet("respuestas", {
    select: "orden_ref",
    domicilio: `eq.${domicilio}`
  });
  respData.forEach(r => ordenesRespondidas.add(String(r.orden_ref)));

  const todasOrdenes = Object.values(hojas).flatMap(h => h.ordenes);
  let conteoClaves = {};
  if (todasOrdenes.length > 0) {
    const dataClaves = await sbGet("claves_tareas", {
      select: "orden",
      orden: `in.(${todasOrdenes.join(",")})`,
      mes: `eq.${estado.mes}`
    });
    const ordenAPpal = {};
    Object.values(hojas).forEach(h => {
      h.ordenes.forEach(o => { ordenAPpal[String(o)] = String(h.ordenPpal); });
    });
    dataClaves.forEach(r => {
      const ppal = ordenAPpal[String(r.orden)] || String(r.orden);
      conteoClaves[ppal] = (conteoClaves[ppal] || 0) + 1;
    });
  }

  // Buscar MEINs creadas para estas ordenes
  const todasOrdenesPpal = Object.values(hojas).map(h => h.ordenPpal);
  let meinMap = {};
  if (todasOrdenesPpal.length > 0) {
    try {
      const dataMeins = await sbGet("meins_pendientes", {
        select: "orden,mein_creada",
        orden:  `in.(${todasOrdenesPpal.join(",")})`,
        estado: "eq.creada"
      });
      dataMeins.forEach(r => {
        // Solo guardar si mein_creada es diferente a la orden (MEIN real)
        if (r.mein_creada && String(r.mein_creada) !== String(r.orden)) {
          meinMap[String(r.orden)] = r.mein_creada;
        }
      });
    } catch (_) { /* silencioso intencional */ }
  }

  const lista = Object.values(hojas).map(h => ({
    ordenPpal:  h.ordenPpal,
    tipo:       h.tipo,
    fechaFin:   h.fechaFin,
    cantTareas: conteoClaves[String(h.ordenPpal)] || h.ordenes.length,
    ordenes:    h.ordenes,
    mein:       meinMap[String(h.ordenPpal)] || "Pendiente",
    // Realizada si CUALQUIERA de sus ordenes individuales fue respondida
    realizada:  h.ordenes.some(o => ordenesRespondidas.has(String(o)))
  }));

  return { ok: true, hojas: lista };
}

async function getTareas(ordenPpal, ordenesYaCalculadas) {
  let ordenes = ordenesYaCalculadas && ordenesYaCalculadas.length > 0
                  ? ordenesYaCalculadas : null;
  let fechaInicio = "";
  let fechaFin    = "";

  if (!ordenes) {
    const dataHojas = await sbGet("colegios_hojas", {
      select: "orden,fecha_inicio,fecha_fin",
      orden_principal: `eq.${ordenPpal}`
    });
    ordenes     = dataHojas.map(r => r.orden);
    fechaInicio = dataHojas[0]?.fecha_inicio || "";
    fechaFin    = dataHojas[0]?.fecha_fin    || "";
    if (ordenes.length === 0) ordenes = [ordenPpal];
  } else {
    const dataFechas = await sbGet("colegios_hojas", {
      select: "fecha_inicio,fecha_fin",
      orden: `eq.${ordenesYaCalculadas[0]}`
    });
    fechaInicio = dataFechas[0]?.fecha_inicio || "";
    fechaFin    = dataFechas[0]?.fecha_fin    || "";
  }

  const dataClaves = await sbGet("claves_tareas", {
    select: "orden,clave,texto_breve,descripcion,orden_fila",
    orden: `in.(${ordenes.join(",")})`,
    order: "orden_fila.asc"
  });

  const tareas = dataClaves.map(r => ({
    orden: r.orden, clave: r.clave,
    texto: r.texto_breve, descripcion: r.descripcion
  }));

  // Buscar MEIN en meins_pendientes
  let mein = "Pendiente";
  try {
    const dataMein = await sbGet("meins_pendientes", {
      select: "mein_creada",
      orden: `eq.${ordenPpal}`,
      estado: "eq.creada"
    });
    if (dataMein && dataMein.length > 0 && dataMein[0].mein_creada) {
      const meinCreada = String(dataMein[0].mein_creada);
      // Si mein_creada es igual a la orden, no es una MEIN real
      if (meinCreada !== String(ordenPpal)) {
        mein = meinCreada;
      }
    }
  } catch (_) { /* silencioso intencional */ }

  // Si sigue sin MEIN real, buscar en respuestas (columna mein)
  if (mein === "Pendiente") {
    try {
      const dataResp = await sbGet("respuestas", {
        select: "mein",
        orden_ref: `eq.${ordenPpal}`,
        limit: "1"
      });
      if (dataResp && dataResp.length > 0 && dataResp[0].mein) {
        const meinResp = String(dataResp[0].mein);
        // Solo usar si es diferente a la orden
        if (meinResp !== String(ordenPpal)) {
          mein = meinResp;
        }
      }
    } catch (_) { /* silencioso intencional */ }
  }

  return { ok: true, tareas, fechaInicio, fechaFin, mein };
}

async function apiPost(body) {
  const filas = body.tareas.map(t => ({
    mein:          t.mein,
    orden_ref:     t.ordenRef,
    domicilio:     t.domicilio,
    tipo:          t.tipo,
    respuesta:     t.respuesta,
    operario:      t.operario,
    jefe:          t.jefe,
    observaciones: t.observaciones || "",
    mes:           estado.mes || ""
  }));
  return await sbPost("respuestas", filas);
}

function actualizarProgreso() {
  const wrap = document.getElementById("progreso-tareas-wrap");
  if (!wrap) return;

  const total = estado.tareas.length;
  if (total === 0) return;

  const completadas = Object.values(estado.respuestas).filter(r =>
    r && (r.texto || r.opcion)
  ).length;

  const pct = Math.round((completadas / total) * 100);
  const fill = document.getElementById("progreso-bar-fill");
  const num  = document.getElementById("progreso-tareas-num");
  const est  = document.getElementById("progreso-tareas-estado");

  if (fill) {
    fill.style.width = pct + "%";
    if (completadas === total) {
      fill.classList.add("completo");
    } else {
      fill.classList.remove("completo");
    }
  }
  if (num) num.textContent = completadas + " / " + total;
  if (est) {
    if (completadas === 0) {
      est.textContent = "Ninguna tarea completada aún";
    } else if (completadas === total) {
      est.textContent = "✓ Todas las tareas completadas — podés enviar";
      est.style.color = "var(--success)";
      est.style.fontWeight = "600";
    } else {
      est.textContent = (total - completadas) + " tarea(s) pendiente(s)";
      est.style.color = "var(--muted)";
      est.style.fontWeight = "400";
    }
  }
}

const STORAGE_KEY = "mepl_progreso";

function guardarProgreso() {
  if (!estado.hojaSeleccionada || !estado.domicilio) return;
  const datos = {
    mes:              estado.mes,
    modo:             estado.modo,
    domicilio:        estado.domicilio,
    hojaSeleccionada: estado.hojaSeleccionada,
    tareas:           estado.tareas,
    respuestas:       estado.respuestas,
    operario:         estado.operario,
    jefe:             estado.jefe,
    observaciones:    estado.observaciones,
    fechaInicio:      estado.fechaInicio,
    fechaFin:         estado.fechaFin,
    mein:             estado.mein || "",
    timestamp:        Date.now()
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(datos)); } catch(_) {}
}

function limpiarProgreso() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(_) {}
}

function cargarProgresoGuardado() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const datos = JSON.parse(raw);
    // Expirar después de 24 horas
    if (Date.now() - datos.timestamp > 86400000) { limpiarProgreso(); return null; }
    return datos;
  } catch(_) { return null; }
}

function mostrarBannerProgreso(datos, app) {
  const hace = Math.round((Date.now() - datos.timestamp) / 60000);
  const cuandoStr = hace < 60
    ? `hace ${hace} minuto${hace !== 1 ? "s" : ""}`
    : `hace ${Math.round(hace / 60)} hora${Math.round(hace/60) !== 1 ? "s" : ""}`;

  const respuestas = Object.keys(datos.respuestas || {}).length;
  const total      = (datos.tareas || []).length;

  const banner = document.createElement("div");
  banner.className = "progreso-banner";
  banner.id = "progreso-banner";
  banner.innerHTML = `
    <div class="progreso-banner-info">
      <div class="progreso-banner-titulo">📝 Formulario incompleto guardado</div>
      <div class="progreso-banner-sub">
        ${esc(datos.domicilio)} — ${esc(datos.hojaSeleccionada?.tipo || "")}
        · ${respuestas}/${total} tareas completadas · ${cuandoStr}
      </div>
    </div>
    <div class="progreso-banner-acciones">
      <button class="btn btn-warning" onclick="continuarProgreso()">Continuar</button>
      <button class="btn btn-back" onclick="descartarProgreso()">Descartar</button>
    </div>`;
  app.insertBefore(banner, app.firstChild);
}

function continuarProgreso() {
  const datos = cargarProgresoGuardado();
  if (!datos) return;
  // Restaurar estado completo
  estado.mes             = datos.mes;
  estado.modo            = datos.modo;
  estado.domicilio       = datos.domicilio;
  estado.hojaSeleccionada = datos.hojaSeleccionada;
  estado.tareas          = datos.tareas;
  estado.respuestas      = datos.respuestas;
  estado.operario        = datos.operario;
  estado.jefe            = datos.jefe;
  estado.observaciones   = datos.observaciones;
  estado.fechaInicio     = datos.fechaInicio;
  estado.fechaFin        = datos.fechaFin;
  estado.mein            = datos.mein || "";
  estado.paso            = 3;
  estado.vista           = "formulario";
  // Actualizar header mes
  const headerMes = document.getElementById("header-mes");
  if (headerMes) {
    headerMes.textContent = datos.mes.toUpperCase() + " " + new Date().getFullYear();
    headerMes.style.display = "inline";
  }
  const banner = document.getElementById("progreso-banner");
  if (banner) banner.remove();
  render();
  // Restaurar respuestas visuales después del render
  // Esperar al siguiente frame del navegador para restaurar
  requestAnimationFrame(() => requestAnimationFrame(restaurarRespuestasVisuales));
}

function restaurarRespuestasVisuales() {
  Object.entries(estado.respuestas).forEach(([key, r]) => {
    const txt = document.getElementById("txt_" + key);
    if (txt) txt.value = r.texto || "";
    // Restaurar botón seleccionado
    const btnContainer = txt?.closest(".tarea-respuesta")?.querySelector(".respuesta-opciones");
    if (!btnContainer || !r.opcion) return;
    btnContainer.querySelectorAll(".opcion-btn").forEach(btn => {
      const esNA      = r.opcion === "No aplica" || r.opcion === "En obra";
      const esInforme = r.opcion === "se adjunta informe de consumo";
      if (btn.textContent.trim() === r.opcion) {
        btn.classList.add(esNA ? "selected-na" : esInforme ? "selected-informe" : "selected");
      }
    });
  });
  // Restaurar operario y jefe
  const inpOp = document.getElementById("inp-operario");
  const inpJe = document.getElementById("inp-jefe");
  const inpObs = document.getElementById("inp-observaciones");
  if (inpOp)  inpOp.value  = estado.operario || "";
  if (inpJe)  inpJe.value  = estado.jefe     || "";
  if (inpObs) inpObs.value = estado.observaciones || "";
  actualizarProgreso();
}

function descartarProgreso() {
  limpiarProgreso();
  const banner = document.getElementById("progreso-banner");
  if (banner) banner.remove();
}

  fechaInicio: "", fechaFin: "", observaciones: "",

};

function render() {
  const app = document.getElementById("app");

  if (estado.vista === "admin") {
    renderAdmin();
    return;
  }

  const btnInicio = document.getElementById("btn-inicio");
  const btnVolver = document.getElementById("btn-volver");
  if (btnInicio) btnInicio.style.display = estado.paso <= -1 ? "none" : "block";
  if (btnVolver) btnVolver.style.display = estado.paso <= 0 ? "none" : "block";

  if (estado.paso === -2) { app.innerHTML = ""; renderBienvenida(); return; }
  if (estado.paso === -1) { app.innerHTML = ""; renderSelectorMes(); return; }
  if (estado.paso === 0)  { app.innerHTML = ""; renderModo(); return; }

  const pasos = estado.modo === "tipo"
    ? ["Tipo", "Colegio", "Respuestas", "Confirmación"]
    : ["Colegio", "Hoja", "Respuestas", "Confirmación"];

  let html = `<div class="paso-indicator">`;
  pasos.forEach((p, i) => {
    const cls = i + 1 === estado.paso ? "activo" : i + 1 < estado.paso ? "completo" : "";
    const circulo = cls === "completo" ? "✓" : (i + 1);
    html += `<div class="paso ${cls}"><span class="paso-circle">${circulo}</span><span class="paso-label">${i+1}. ${p}</span></div>`;
  });
  html += `</div>`;
  app.innerHTML = html;

  if (estado.modo === "tipo") {
    if      (estado.paso === 1) renderTipos();
    else if (estado.paso === 2) renderColegiosPorTipo();
    else if (estado.paso === 3) { if (estado.tareas && estado.tareas.length > 0) renderFormularioTareas(); }
    else if (estado.paso === 4) renderConfirmacion();
  } else {
    if      (estado.paso === 1) renderColegios();
    else if (estado.paso === 2) renderHojas();
    else if (estado.paso === 3) { if (estado.tareas && estado.tareas.length > 0) renderFormularioTareas(); }
    else if (estado.paso === 4) renderConfirmacion();
  }
}

function pinPresionar(digito) {
  if (pinIngresado.length >= 4) return;
  pinIngresado += digito;
  actualizarDots();
  if (pinIngresado.length === 4) {
    setTimeout(verificarPin, 150);
  }
}

function pinBorrar() {
  pinIngresado = pinIngresado.slice(0, -1);
  actualizarDots();
  document.getElementById("pin-error").textContent = "";
}

function actualizarDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById("pd" + i);
    if (!dot) return;
    dot.classList.toggle("filled", i < pinIngresado.length);
    dot.classList.remove("error");
  }
}

function verificarPin() {
  if (pinIngresado === ADMIN_PIN) {
    pinVerificado = true;
    pinCancelar();
    _abrirAdmin();
  } else {
    // Mostrar error
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById("pd" + i);
      if (dot) { dot.classList.remove("filled"); dot.classList.add("error"); }
    }
    document.getElementById("pin-error").textContent = "PIN incorrecto";
    setTimeout(() => {
      pinIngresado = "";
      actualizarDots();
      document.getElementById("pin-error").textContent = "";
    }, 1200);
  }
}

}

async function cargarAdmin() {
  const listaEl   = document.getElementById("admin-lista");
  const statsEl   = document.getElementById("admin-stats");
  const filtrosEl = document.getElementById("admin-filtros");
  if (!listaEl) return;
  listaEl.innerHTML = `<div class="loading">Cargando...</div>`;

  try {
    // 1. Traer todos los colegios del mes
    const dataColegios = await sbGet("colegios_hojas", {
      select: "domicilio,orden,orden_principal,texto_breve",
      mes: `eq.${adminMes}`
    });

    // Agrupar por domicilio → solo órdenes ORIGINALES (orden = orden_principal o sin orden_principal)
    // Las MEINs creadas tienen orden != orden_principal y NO se cuentan
    const colegiosMap = {};
    for (const r of dataColegios) {
      const dom  = r.domicilio;
      const ord  = r.orden;
      const ppal = r.orden_principal;
      // Saltar MEINs creadas (tienen orden_principal distinto a orden)
      if (ppal && ppal !== ord) continue;
      if (!colegiosMap[dom]) colegiosMap[dom] = { domicilio: dom, ordenes: new Set() };
      colegiosMap[dom].ordenes.add(ord);
    }

    // 2. Traer MEINs creadas de meins_pendientes donde estado = 'creada'
    const pendientesData = await sbGet("meins_pendientes", {
      select: "*",
      mes: `eq.${adminMes}`
    });

    // Mapear orden → lista de registros en meins_pendientes
    const pendientesMap = {};
    pendientesData.forEach(p => {
      if (!pendientesMap[p.orden]) pendientesMap[p.orden] = [];
      pendientesMap[p.orden].push(p);
    });

    // 4. Construir lista de colegios con conteo real de MEINs
    adminDatos = Object.values(colegiosMap).map(c => {
      const ordenesList = [...c.ordenes];
      const total = ordenesList.length;

      // Contar cuántas órdenes tienen MEIN creada
      let creadas   = 0;
      let errores   = [];
      let enCola    = 0;
      let estadoCola = null;

      ordenesList.forEach(o => {
        const registros = pendientesMap[o] || [];
        // Tomar el último registro de cada orden
        const ultimo = registros[registros.length - 1];
        if (!ultimo) return;
        if (ultimo.estado === "creada")    creadas++;
        if (ultimo.estado === "error")     errores.push({ orden: o, tipo: ultimo.tipo, msg: ultimo.error_msg });
        if (ultimo.estado === "pendiente" || ultimo.estado === "procesando") enCola++;
        if (!estadoCola) estadoCola = ultimo.estado;
      });

      // Determinar estado general del colegio
      let estadoGeneral;
      if (creadas === total && total > 0)      estadoGeneral = "completo";
      else if (creadas > 0 && errores.length > 0) estadoGeneral = "parcial-error";
      else if (creadas > 0)                    estadoGeneral = "parcial";
      else if (errores.length > 0)             estadoGeneral = "error";
      else if (enCola > 0)                     estadoGeneral = "encolada";
      else                                     estadoGeneral = "sin-mein";

      return {
        domicilio:     c.domicilio,
        ordenes:       ordenesList,
        total,
        creadas,
        errores,
        enCola,
        estadoGeneral,
        estadoCola
      };
    }).sort((a, b) => a.domicilio.localeCompare(b.domicilio));

    // Stats
    const total      = adminDatos.length;
    const conMein    = adminDatos.filter(c => c.estadoGeneral === "completo").length;
    const sinMein    = adminDatos.filter(c => c.estadoGeneral === "sin-mein").length;
    const encoladas  = adminDatos.filter(c => c.estadoGeneral === "encolada").length;
    const parciales  = adminDatos.filter(c => c.estadoGeneral === "parcial" || c.estadoGeneral === "parcial-error").length;
    const conError   = adminDatos.filter(c => c.estadoGeneral === "error" || c.estadoGeneral === "parcial-error").length;

    if (statsEl) statsEl.innerHTML = `
      <div class="admin-stat-card"><div class="admin-stat-num">${total}</div><div class="admin-stat-label">Total colegios</div></div>
      <div class="admin-stat-card"><div class="admin-stat-num" style="color:var(--success)">${conMein}</div><div class="admin-stat-label">Completos</div></div>
      <div class="admin-stat-card"><div class="admin-stat-num" style="color:var(--warn)">${sinMein}</div><div class="admin-stat-label">Sin MEIN</div></div>
      <div class="admin-stat-card"><div class="admin-stat-num" style="color:var(--brand)">${encoladas}</div><div class="admin-stat-label">En cola</div></div>
      <div class="admin-stat-card"><div class="admin-stat-num" style="color:var(--warn)">${parciales}</div><div class="admin-stat-label">Parciales</div></div>
      <div class="admin-stat-card"><div class="admin-stat-num" style="color:var(--danger)">${conError}</div><div class="admin-stat-label">Con error</div></div>`;

    if (filtrosEl) filtrosEl.innerHTML = `
      <span style="font-size:0.82rem;color:#666;">Filtrar:</span>
      ${[["todos","Todos"],["sin-mein","Sin MEIN"],["encolada","En cola"],["con-mein","Con MEIN"],["error","Error"]]
        .map(([v,l]) => `<button class="filtro-btn ${adminFiltro===v?"activo":""}" onclick="setFiltroAdmin('${v}')">${l}</button>`).join("")}`;

    renderListaAdmin();

  } catch (e) {
    listaEl.innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
  }
}

function renderListaAdmin() {
  const listaEl = document.getElementById("admin-lista");
  if (!listaEl) return;

  let datos = adminDatos;
  if (adminFiltro === "sin-mein")  datos = datos.filter(c => c.estadoGeneral === "sin-mein");
  if (adminFiltro === "encolada")  datos = datos.filter(c => c.estadoGeneral === "encolada");
  if (adminFiltro === "con-mein")  datos = datos.filter(c => c.estadoGeneral === "completo");
  if (adminFiltro === "error")     datos = datos.filter(c => c.estadoGeneral === "error" || c.estadoGeneral === "parcial-error");

  if (datos.length === 0) {
    listaEl.innerHTML = `<div class="admin-vacio">No hay colegios en esta categoría.</div>`;
    return;
  }

  let html = "";
  datos.forEach((c, idx) => {
    const idxGlobal = adminDatos.indexOf(c);
    let rowClass = "";
    let badge    = "";
    let acciones = "";
    let detalle  = "";

    if (c.estadoGeneral === "completo") {
      rowClass = "con-mein";
      badge    = `<span class="hoja-badge badge-realizada">✓ ${c.creadas}/${c.total} MEINs creadas</span>`;
      acciones = `<button class="btn-sm btn-sm-danger" onclick="cancelarMeinIdx(${idxGlobal})">↺ Re-encolar</button>`;

    } else if (c.estadoGeneral === "parcial") {
      rowClass = "encolada";
      badge    = `<span class="hoja-badge badge-parcial">⚠ ${c.creadas}/${c.total} MEINs creadas</span>`;
      acciones = `<button class="btn-sm btn-sm-warning" onclick="encolarColegioIdx(${idxGlobal})">+ Completar MEINs</button>`;

    } else if (c.estadoGeneral === "parcial-error") {
      rowClass = "error-mein";
      badge    = `<span class="hoja-badge badge-error-mein">✗ ${c.creadas}/${c.total} — ${c.errores.length} error(es)</span>`;
      acciones = `
        <button class="btn-sm btn-sm-warning" onclick="encolarColegioIdx(${idxGlobal})">↺ Reintentar errores</button>
        <button class="btn-sm btn-sm-danger"  onclick="cancelarMeinIdx(${idxGlobal})">✕ Limpiar</button>`;
      detalle = c.errores.map(e =>
        `<div class="admin-error-detalle">✗ Orden ${esc(e.orden)} — ${esc(e.tipo)}: ${esc(e.msg || "error desconocido")}</div>`
      ).join("");

    } else if (c.estadoGeneral === "error") {
      rowClass = "error-mein";
      badge    = `<span class="hoja-badge badge-error-mein">✗ ${c.errores.length} error(es)</span>`;
      acciones = `
        <button class="btn-sm btn-sm-warning" onclick="encolarColegioIdx(${idxGlobal})">↺ Reintentar</button>
        <button class="btn-sm btn-sm-danger"  onclick="cancelarMeinIdx(${idxGlobal})">✕ Limpiar</button>`;
      detalle = c.errores.map(e =>
        `<div class="admin-error-detalle">✗ Orden ${esc(e.orden)} — ${esc(e.tipo)}: ${esc(e.msg || "error desconocido")}</div>`
      ).join("");

    } else if (c.estadoGeneral === "encolada") {
      rowClass = "encolada";
      badge    = `<span class="hoja-badge badge-pendiente-mein">⏳ ${c.enCola}/${c.total} en cola</span>`;
      acciones = `<button class="btn-sm btn-sm-danger" onclick="cancelarMeinIdx(${idxGlobal})">✕ Cancelar</button>`;

    } else {
      rowClass = "sin-mein";
      badge    = `<span class="hoja-badge badge-pendiente-mein">⚠ Sin MEIN (${c.total} órdenes)</span>`;
      acciones = `<button class="btn-sm btn-sm-warning" onclick="encolarColegioIdx(${idxGlobal})">+ Encolar MEIN</button>`;
    }

    html += `
      <div class="admin-colegio-row ${rowClass}">
        <div class="admin-col-info">
          <div class="admin-col-nombre">📍 ${esc(c.domicilio)}</div>
          <div class="admin-col-detalle">Órdenes: ${c.ordenes.join(", ")}</div>
          ${detalle}
        </div>
        <div class="admin-col-acciones">
          ${badge}
          ${acciones}
        </div>
      </div>`;
  });

  listaEl.innerHTML = html;
}

async function encolarColegioIdx(idx) {
  const c = adminDatos[idx];
  if (!c) return;
  await encolarColegio(c.domicilio, c.ordenes);
}

async function cancelarMeinIdx(idx) {
  const c = adminDatos[idx];
  if (!c) return;
  await cancelarMein(c.domicilio, c.ordenes[0]);
}

async function encolarColegio(domicilio, ordenes) {
  const colegio = adminDatos.find(c => c.domicilio === domicilio);
  if (!colegio) return;

  // Cancelar cualquier pendiente/error anterior para este colegio
  await cancelarMeinSilencioso(ordenes);

  try {
    // Traer el tipo real de cada orden desde colegios_hojas
    const dataOrdenes = await sbGet("colegios_hojas", {
      select: "orden,texto_breve",
      orden:  `in.(${ordenes.join(",")})`,
      mes:    `eq.${adminMes}`
    });

    // Mapear orden -> tipo
    const tipoMap = {};
    dataOrdenes.forEach(r => { tipoMap[String(r.orden)] = r.texto_breve || "MEIN"; });

    const filas = ordenes.map(o => ({
      orden:     o,
      domicilio: domicilio,
      tipo:      tipoMap[String(o)] || "MEIN",
      mes:       adminMes,
      estado:    "pendiente"
    }));

    await sbPost("meins_pendientes", filas);
    showToast(`✓ ${domicilio} encolada (${filas.length} órdenes)`, "ok");
    await cargarAdmin();
  } catch (e) {
    showToast("Error al encolar: " + e.message, "err");
  }
}

async function cancelarMein(domicilio, orden) {
  const ok1 = await confirmarModal(`¿Cancelar y limpiar la cola de MEINs para <strong>${esc(domicilio)}</strong>?`, "🗑️");
  if (!ok1) return;
  const colegio = adminDatos.find(c => c.domicilio === domicilio);
  const ordenes = colegio ? colegio.ordenes : [orden];
  await cancelarMeinSilencioso(ordenes);
  showToast("Cola limpiada", "ok");
  await cargarAdmin();
}

async function cancelarMeinSilencioso(ordenes) {
  for (const o of ordenes) {
    try {
      await sbDelete("meins_pendientes", {
        orden: `eq.${o}`,
        mes:   `eq.${adminMes}`,
        estado: `in.(pendiente,error,creada)`
      });
    } catch (_) { /* silencioso intencional */ }
  }
}

async function encolarTodos() {
  const sinMein = adminDatos.filter(c => !c.tieneMein && !c.estadoCola);
  if (sinMein.length === 0) {
    showToast("No hay colegios sin MEIN para encolar", "");
    return;
  }
  const ok2 = await confirmarModal(`¿Encolar <strong>${sinMein.length} colegio(s)</strong> sin MEIN en ${adminMes} ${ANIO}?`, "⚡");
  if (!ok2) return;

  try {
    // Traer tipos reales de todas las órdenes de una sola vez
    const todasOrdenes = sinMein.flatMap(c => c.ordenes);
    const dataOrdenes = await sbGet("colegios_hojas", {
      select: "orden,texto_breve,domicilio",
      orden:  `in.(${todasOrdenes.join(",")})`,
      mes:    `eq.${adminMes}`
    });

    const tipoMap = {};
    dataOrdenes.forEach(r => { tipoMap[String(r.orden)] = r.texto_breve || "MEIN"; });

    let filas = [];
    sinMein.forEach(c => {
      c.ordenes.forEach(o => {
        filas.push({
          orden:     o,
          domicilio: c.domicilio,
          tipo:      tipoMap[String(o)] || "MEIN",
          mes:       adminMes,
          estado:    "pendiente"
        });
      });
    });

    // Insertar en batches de 50
    for (let i = 0; i < filas.length; i += 50) {
      await sbPost("meins_pendientes", filas.slice(i, i + 50));
    }
    showToast(`✓ ${sinMein.length} colegio(s) encolados (${filas.length} órdenes)`, "ok");
    await cargarAdmin();
  } catch (e) {
    showToast("Error: " + e.message, "err");
  }
}

async function exportarReporte() {
  const btn = document.getElementById("btn-exportar");
  if (btn) { btn.disabled = true; btn.textContent = "⏳ Generando..."; }

  try {
    // Traer todos los datos necesarios
    const [dataColegios, dataMeins, dataRespuestas] = await Promise.all([
      sbGet("colegios_hojas", { select: "domicilio,orden,orden_principal,texto_breve", mes: `eq.${adminMes}` }),
      sbGet("meins_pendientes", { select: "orden,mein_creada,estado,error_msg", mes: `eq.${adminMes}` }),
      sbGet("respuestas", { select: "domicilio,tipo,orden_ref,operario,created_at", mes: `eq.${adminMes}` })
    ]);

    // Construir mapa de MEINs
    const meinMap = {};
    dataMeins.forEach(m => {
      if (!meinMap[m.orden]) meinMap[m.orden] = m;
    });

    // Construir mapa de respuestas por domicilio+tipo
    const respMap = {};
    dataRespuestas.forEach(r => {
      const key = `${r.domicilio}||${r.tipo}`;
      if (!respMap[key]) respMap[key] = [];
      respMap[key].push(r);
    });

    // Construir filas agrupando por domicilio + orden principal
    const colegiosMap = {};
    for (const r of dataColegios) {
      const ppal = r.orden_principal && r.orden_principal !== r.orden ? r.orden_principal : r.orden;
      const key  = `${r.domicilio}||${ppal}`;
      if (!colegiosMap[key]) {
        colegiosMap[key] = {
          domicilio: r.domicilio,
          ordenPpal: ppal,
          tipo: r.texto_breve,
          ordenes: new Set()
        };
      }
      colegiosMap[key].ordenes.add(r.orden);
    }

    // Construir filas del reporte
    const filas = Object.values(colegiosMap).map(col => {
      const mein      = meinMap[col.ordenPpal];
      const meinNum   = mein?.mein_creada || "—";
      const estadoMein = mein?.estado === "creada" ? "Creada" :
                         mein?.estado === "error"  ? "Error" :
                         mein?.estado === "pendiente" ? "En cola" : "Sin MEIN";

      const respKey   = `${col.domicilio}||${col.tipo}`;
      const resps     = respMap[respKey] || [];
      const respondida = resps.length > 0 ? "Sí" : "No";
      const operario  = resps.length > 0 ? resps[0].operario : "—";
      const fecha     = resps.length > 0
        ? new Date(resps[0].created_at).toLocaleString("es-AR", { timeZone: "America/Argentina/Buenos_Aires" })
        : "—";

      return {
        "Domicilio":        col.domicilio,
        "Tipo de tarea":    col.tipo || "—",
        "N° Orden":         col.ordenPpal,
        "MEIN":             meinNum,
        "Estado MEIN":      estadoMein,
        "Respondida":       respondida,
        "Operario":         operario,
        "Fecha de envío":   fecha,
        "Mes":              adminMes,
      };
    }).sort((a, b) => a["Domicilio"].localeCompare(b["Domicilio"]));

    // Generar CSV (compatible con Excel)
    const cols = ["Domicilio","Tipo de tarea","N° Orden","MEIN","Estado MEIN","Respondida","Operario","Fecha de envío","Mes"];
    const bom  = "﻿"; // BOM para que Excel reconozca UTF-8
    const sep  = ";";      // punto y coma — estándar en Excel español

    const header = cols.join(sep);
    const rows   = filas.map(f =>
      cols.map(col => {
        const val = String(f[col] || "").replace(/"/g, '""');
        return val.includes(sep) || val.includes("\n") ? `"${val}"` : val;
      }).join(sep)
    );

    const csv = bom + header + "\n" + rows.join("\n");

    // Descargar
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `MEPL_${adminMes}_${ANIO}_reporte.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    showToast(`✓ Reporte exportado — ${filas.length} colegios`, "ok");

  } catch (e) {
    showToast("Error al exportar: " + e.message, "err");
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = "📥 Exportar Excel"; }
  }
}

async function renderTipos() {

  </div>`;

  try {

    const tipos = [...new Set(data.map(r => r.texto_breve).filter(Boolean))].sort();

    const iconos = {
      "GAS":"🔥","AGUA":"💧","ELECTRICA":"⚡","ELECTR":"⚡",
      "SANEAMIENTO":"🧹","ESTRUCTURA":"🏗️","MAMPOSTERIA":"🧱",
      "CALEFACCION":"♨️","INCENDIO":"🚒","PLUVIALES":"🌧️",

      "CERRAMIENTO":"🚪","ELEVADORA":"🛗","PLATAFORMA":"🛗"
    };
    function getIcono(tipo) {
      const t = tipo.toUpperCase();
      for (const [k, v] of Object.entries(iconos)) if (t.includes(k)) return v;
      return "📋";
    }

    let html = `<div class="tipos-grid">`;
    tipos.forEach(t => {
      html += `<div class="tipo-card" onclick="seleccionarTipo('${esc(t)}')">
        <span class="tipo-icono">${getIcono(t)}</span>${esc(t)}</div>`;
    });
    html += `</div><br><button class="btn btn-back" onclick="volverModo()">← Cambiar modo</button>`;
    setContenido("contenido-tipos", html);
  } catch (e) {
    setContenido("contenido-tipos", `<div class="error-msg">Error: ${e.message}</div>`);

}

async function renderColegiosPorTipo() {
  const app = document.getElementById("app");
  app.innerHTML += `<div class="card">
    <h2>${esc(estado.tipoSeleccionado)}</h2>
    <div id="contenido-colegios-tipo" class="loading">Cargando colegios...</div>
  </div>`;

  try {
    const data = await sbGet("colegios_hojas", {
      select: "domicilio,orden,orden_principal,fecha_fin",
      texto_breve: `eq.${estado.tipoSeleccionado}`,
      mes: `eq.${estado.mes}`
    });

    const colegios = {};
    for (const r of data) {
      const dom  = r.domicilio;
      const ppal = r.orden_principal && r.orden_principal !== r.orden ? r.orden_principal : r.orden;
      if (!colegios[dom]) colegios[dom] = { domicilio: dom, ordenPpal: ppal, fechaFin: r.fecha_fin, ordenes: [] };
      if (!colegios[dom].ordenes.includes(r.orden)) colegios[dom].ordenes.push(r.orden);
    }

    const ordenesAll = Object.values(colegios).map(c => c.ordenPpal);
    let respondidas = new Set();
    if (ordenesAll.length > 0) {
      const respData = await sbGet("respuestas", {
        select: "orden_ref",
        orden_ref: `in.(${ordenesAll.join(",")})`
      });
      respData.forEach(r => respondidas.add(String(r.orden_ref)));
    }

    const todasOrdenes = Object.values(colegios).flatMap(c => c.ordenes);
    let conteoClaves = {};
    if (todasOrdenes.length > 0) {
      const dataClaves = await sbGet("claves_tareas", {
        select: "orden",
        orden: `in.(${todasOrdenes.join(",")})`
      });
      const ordenAPpal = {};
      Object.values(colegios).forEach(c => {
        c.ordenes.forEach(o => { ordenAPpal[String(o)] = String(c.ordenPpal); });
      });
      dataClaves.forEach(r => {
        const ppal = ordenAPpal[String(r.orden)] || String(r.orden);
        conteoClaves[ppal] = (conteoClaves[ppal] || 0) + 1;
      });
    }

    const lista = Object.values(colegios).map(c => ({
      ...c,
      cantTareas: conteoClaves[String(c.ordenPpal)] || c.ordenes.length,
      realizada: respondidas.has(String(c.ordenPpal))
    })).sort((a, b) => a.domicilio.localeCompare(b.domicilio));

    if (lista.length === 0) {
      setContenido("contenido-colegios-tipo", `<div class="error-msg">No hay colegios con este tipo de tarea.</div>`);
      return;
    }

    let html = `<p style="font-size:0.85rem;color:#666;margin-bottom:14px;">
      ${lista.filter(c => !c.realizada).length} pendiente(s) · ${lista.filter(c => c.realizada).length} realizada(s)</p>`;

    lista.forEach(c => {
      if (c.realizada) {
        html += `<div class="colegio-tipo-item realizada">
          <div><div class="hoja-tipo">📍 ${esc(c.domicilio)}</div>
          <div class="hoja-info">Orden: ${esc(c.ordenPpal)}${c.fechaFin ? ' · Vence: '+esc(c.fechaFin):''}</div></div>
          <div class="hoja-badge badge-realizada">✓ Realizada</div></div>`;
      } else {
        html += `<div class="colegio-tipo-item" onclick="seleccionarColegioTipo(${JSON.stringify(c).replace(/"/g,'&quot;')})">
          <div><div class="hoja-tipo">📍 ${esc(c.domicilio)}</div>
          <div class="hoja-info">Orden: ${esc(c.ordenPpal)}${c.fechaFin ? ' · Vence: '+esc(c.fechaFin):''}</div></div>
          <div class="hoja-badge">${c.cantTareas} tarea${c.cantTareas !== 1 ? 's':''}</div></div>`;
      }
    });

    html += `<br><button class="btn btn-back" onclick="volver()">← Cambiar tipo</button>`;
    setContenido("contenido-colegios-tipo", html);
  } catch (e) {
    setContenido("contenido-colegios-tipo", `<div class="error-msg">Error: ${e.message}</div>`);
  }
}

function elegirOpcion(key, opcion, btn) {
  btn.closest(".respuesta-opciones").querySelectorAll(".opcion-btn").forEach(b => {
    b.classList.remove("selected","selected-na","selected-informe");
  });
  const esNA      = opcion === "No aplica" || opcion === "En obra";
  const esInforme = opcion === "se adjunta informe de consumo";
  if (esNA) btn.classList.add("selected-na");
  else if (esInforme) btn.classList.add("selected-informe");
  else btn.classList.add("selected");

  const txt = document.getElementById(`txt_${key}`);
  if (esNA) { txt.value = opcion.toLowerCase(); txt.style.opacity = "0.5"; }
  else if (esInforme) { txt.value = "se adjunta informe de consumo"; txt.style.opacity = "0.6"; }
  else {
    if (["no aplica","en obra","se adjunta informe de consumo"].includes(txt.value)) txt.value = "";
    txt.style.opacity = "1";
  }
  estado.respuestas[key] = { opcion, texto: txt.value };
  guardarProgreso(); // autoguardar
  actualizarProgreso();
}

function actualizarRespuesta(key) {
  const txt = document.getElementById(`txt_${key}`).value;
  if (!estado.respuestas[key]) estado.respuestas[key] = { opcion: "", texto: "" };
  estado.respuestas[key].texto = txt;
  guardarProgreso(); // autoguardar
  actualizarProgreso();
}

async function enviarRespuestas() {
  const errorDiv = document.getElementById("error-envio");
  errorDiv.innerHTML = "";

  const sinResponder = estado.tareas.filter(t => {
    const key = `${t.orden}_${t.clave}`;
    const r = estado.respuestas[key];
    return !r || (!r.texto && !r.opcion);
  });

  if (sinResponder.length > 0) {
    errorDiv.innerHTML = `<div class="error-msg">📋 Falta completar ${sinResponder.length} tarea(s): ${sinResponder.map(t=>t.clave).join(", ")}</div>`;
    // Scroll a la primera tarea sin responder
    const primeraFaltante = sinResponder[0];
    const key = `${primeraFaltante.orden}_${primeraFaltante.clave}`;
    const txtEl = document.getElementById("txt_" + key);
    if (txtEl) {
      const card = txtEl.closest(".tarea-card");
      if (card) {
        card.scrollIntoView({ behavior: "smooth", block: "center" });
        // Resaltar la card brevemente
        card.style.transition = "box-shadow .3s";
        card.style.boxShadow = "0 0 0 3px rgba(220,38,38,0.4)";
        setTimeout(() => { card.style.boxShadow = ""; }, 2000);
      }
    }
    return;
  }
  if (!estado.operario.trim()) {
    errorDiv.innerHTML = `<div class="error-msg">Ingresá el nombre del operario.</div>`;
    return;
  }

  const tareasPorMEIN = {};
  estado.tareas.forEach(t => {
    const key = `${t.orden}_${t.clave}`;
    const r = estado.respuestas[key] || {};
    const respTexto = r.texto || r.opcion || "no aplica";
    if (!tareasPorMEIN[t.orden]) {
      tareasPorMEIN[t.orden] = {
        mein: t.orden, ordenRef: estado.hojaSeleccionada.ordenPpal,
        domicilio: estado.domicilio, tipo: estado.hojaSeleccionada.tipo, respuestas: []
      };
    }
    tareasPorMEIN[t.orden].respuestas.push(respTexto);
  });

  const tareas = Object.values(tareasPorMEIN).map(m => ({
    mein: m.mein, ordenRef: m.ordenRef, domicilio: m.domicilio,
    tipo: m.tipo, respuesta: m.respuestas.join("||"),
    operario: estado.operario, jefe: estado.jefe,
    observaciones: estado.observaciones || ""
  }));

  const btn = document.querySelector(".btn-success");
  btn.disabled = true;
  mostrarEnviando();

  try {
    const res = await apiPost({ tareas });
    if (!res.ok) throw new Error(res.error);
    limpiarProgreso();
    mostrarExito(() => {
      estado.paso = 4;
      render();
    });
  } catch (e) {
    logError(e.message, "enviar-respuestas");
    logError(e.message, "enviarRespuestas");
    ocultarEnviando();
    errorDiv.innerHTML = `<div class="error-msg">📡 ${e.message}</div>`;
    btn.disabled = false;
  }
}

  const app = document.getElementById("app");
  app.innerHTML += `
    <div class="card">
      <div class="success-msg">
        <h3>✅ Respuestas enviadas</h3>
        <p>Las respuestas de <strong>${esc(estado.hojaSeleccionada.tipo)}</strong><br>
        en <strong>${esc(estado.domicilio)}</strong><br>
        fueron guardadas correctamente.</p>
        <br>
        <button class="btn btn-primary" onclick="reiniciar()">Completar otra hoja</button>
      </div>
    </div>`;
}

function reiniciar() {
  if (estado.modo === "tipo") {
    estado.paso = 2;
    estado.hojaSeleccionada = null;
    estado.tareas = []; estado.respuestas = {};
    estado.operario = ""; estado.jefe = "";
    estado.fechaInicio = ""; estado.fechaFin = "";
    render();
  } else {
    const dom = estado.domicilio;
    const mes = estado.mes;
    const modo = estado.modo;
    // Resetear estado completamente pero mantener domicilio y mes
    estado = { paso: 2, modo: modo, tipoSeleccionado: "",
               domicilio: dom, mes: mes, hojaSeleccionada: null,
               tareas: [], respuestas: {}, operario: "", jefe: "",
               fechaInicio: "", fechaFin: "", observaciones: "",
               vista: "formulario" };
    // Forzar recarga completa del paso 2 para que consulte Supabase de nuevo
    const app = document.getElementById("app");
    app.innerHTML = "";
    render();
  }
}

function volver() {
  if (estado.vista === "admin") { estado.vista = "formulario"; estado.paso = 0; render(); return; }
  if (estado.paso <= 1) { volverModo(); return; }
  estado.paso = estado.paso - 1;
  render();
}

// ── helpers ──────────────────────────────────────────────────
function formatearDescripcion(texto) {
  if (!texto) return "";
  const norm = texto.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const idx  = norm.indexOf("\n");
  if (idx > 0) {
    return `<strong style="display:block;margin-bottom:6px;">${esc(norm.slice(0,idx).trim())}</strong>${esc(norm.slice(idx+1).trim()).replace(/\n/g,"<br>")}`;
  }
  return esc(norm);
}

function esc(str) {
  return String(str||"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── inicio ───────────────────────────────────────────────────
estado.paso = -2;
render();
</script>
