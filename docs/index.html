<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>MEPL — Formulario de Respuestas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ac:#6366f1; --ac-2:#818cf8; --ac-hi:#a5b4fc; --ac-glow:rgba(99,102,241,.35);
      --ok:#10b981; --ok-2:#34d399; --bad:#f43f5e; --warn:#f59e0b;
      --bg:#f7f8fa; --bg-2:#eef0f4; --panel:#ffffff; --panel-2:#fbfcfe;
      --side:#0f1117; --side-2:#161922; --side-line:rgba(255,255,255,.07);
      --side-fg:#e7e9ef; --side-dim:#8b90a0;
      --line:#e5e8ee; --line-2:#d4d9e2;
      --fg:#11131a; --sub:#5b6473; --dim:#939aa8;
      --field:#ffffff; --field-line:#d9dee7; --code-bg:#f1f3f7;
      --e1:0 1px 2px rgba(17,19,26,.05);
      --e2:0 2px 8px rgba(17,19,26,.06),0 1px 2px rgba(17,19,26,.04);
      --e3:0 8px 30px rgba(17,19,26,.1),0 2px 8px rgba(17,19,26,.05);
      --e4:0 20px 60px rgba(17,19,26,.18),0 6px 16px rgba(17,19,26,.08);
      --sans:'Inter',system-ui,-apple-system,sans-serif;
      --mono:'JetBrains Mono',ui-monospace,monospace;
      --r1:8px; --r2:11px; --r3:14px; --r4:18px; --rf:999px;
      --t1:130ms cubic-bezier(.4,0,.2,1); --t2:240ms cubic-bezier(.4,0,.2,1);
      --sidew:268px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#0b0d12; --bg-2:#0f1117; --panel:#14171f; --panel-2:#181c25;
        --side:#0a0c11; --side-2:#11141b; --side-line:rgba(255,255,255,.06);
        --side-fg:#e7e9ef; --side-dim:#7f859a;
        --line:#232734; --line-2:#2d3340;
        --fg:#eceef4; --sub:#a2a9ba; --dim:#6b7282;
        --field:#1a1e28; --field-line:#2d3340; --code-bg:#1a1e28;
        --ac:#818cf8; --ac-2:#a5b4fc;
        --e1:0 1px 2px rgba(0,0,0,.3);
        --e2:0 2px 8px rgba(0,0,0,.35),0 1px 2px rgba(0,0,0,.3);
        --e3:0 8px 30px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.35);
        --e4:0 20px 60px rgba(0,0,0,.65),0 6px 16px rgba(0,0,0,.45);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      *,*::before,*::after { animation-duration:.01ms !important; transition-duration:.01ms !important; }
    }
    html { font-size:16px; -webkit-tap-highlight-color:transparent; }
    body { font-family:var(--sans); background:var(--bg); color:var(--fg); min-height:100vh; line-height:1.6; -webkit-font-smoothing:antialiased; letter-spacing:-.005em; }
    ::selection { background:var(--ac-glow); }

    /* ══ SHELL ══ */
    .shell { display:flex; min-height:100vh; }

    /* ── SIDEBAR ── */
    .sidebar { width:var(--sidew); flex-shrink:0; position:fixed; top:0; bottom:0; left:0; z-index:100; background:linear-gradient(180deg, var(--side) 0%, var(--side-2) 100%); border-right:1px solid var(--side-line); display:flex; flex-direction:column; color:var(--side-fg); }
    .sb-brand { display:flex; align-items:center; gap:11px; padding:20px 20px 18px; border-bottom:1px solid var(--side-line); }
    .sb-logo { width:34px; height:34px; border-radius:9px; flex-shrink:0; background:linear-gradient(135deg, var(--ac), var(--ac-2)); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-weight:700; font-size:.82rem; color:#fff; box-shadow:0 4px 14px var(--ac-glow), 0 1px 0 rgba(255,255,255,.25) inset; }
    .sb-brand-name { font-size:.92rem; font-weight:700; letter-spacing:-.01em; color:#fff; line-height:1.1; }
    .sb-brand-sub { font-size:.7rem; color:var(--side-dim); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sb-orden { margin:14px; padding:14px; border-radius:var(--r3); display:none; background:linear-gradient(160deg, rgba(99,102,241,.16), rgba(99,102,241,.04)); border:1px solid rgba(129,140,248,.22); position:relative; overflow:hidden; }
    .sb-orden::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg, var(--ac), var(--ac-2)); }
    .sb-orden-mes { font-size:.72rem; font-weight:700; color:var(--ac-hi); letter-spacing:.04em; margin-bottom:10px; }
    .sb-orden-tags { display:flex; gap:6px; margin-bottom:12px; }
    .sb-orden-tag { font-size:.6rem; font-weight:700; letter-spacing:.04em; color:var(--side-fg); background:rgba(255,255,255,.08); padding:2px 8px; border-radius:var(--rf); border:1px solid rgba(255,255,255,.1); }
    .sb-orden-num { margin-bottom:9px; }
    .sb-orden-num:last-child { margin-bottom:0; }
    .sb-orden-k { font-size:.56rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--side-dim); margin-bottom:2px; }
    .sb-orden-v { font-family:var(--mono); font-size:1.05rem; font-weight:600; color:#fff; line-height:1; }
    .sb-steps { padding:8px 14px; display:none; flex-direction:column; gap:2px; position:relative; }
    .sb-steps-line { position:absolute; left:28px; top:24px; bottom:24px; width:1.5px; background:var(--side-line); }
    .sb-step { display:flex; align-items:center; gap:12px; padding:9px 8px; border-radius:var(--r1); position:relative; z-index:1; }
    .sb-step-dot { width:28px; height:28px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:.75rem; font-weight:700; background:var(--side-2); border:1.5px solid var(--side-line); color:var(--side-dim); transition:all var(--t2); }
    .sb-step-name { font-size:.84rem; font-weight:500; color:var(--side-dim); transition:color var(--t2); }
    .sb-step.activo .sb-step-dot { background:var(--ac); border-color:var(--ac); color:#fff; box-shadow:0 0 0 4px var(--ac-glow); }
    .sb-step.activo .sb-step-name { color:#fff; font-weight:700; }
    .sb-step.completo .sb-step-dot { background:var(--ok); border-color:var(--ok); color:#fff; }
    .sb-step.completo .sb-step-name { color:var(--side-fg); }
    .sb-spacer { flex:1; }
    .sb-foot { padding:14px 18px; border-top:1px solid var(--side-line); display:flex; flex-direction:column; gap:10px; }
    .sb-foot-row { display:flex; align-items:center; gap:9px; font-size:.74rem; color:var(--side-dim); }
    .sb-foot-dot { width:7px; height:7px; border-radius:50%; background:var(--ok); box-shadow:0 0 8px var(--ok); flex-shrink:0; }
    .sb-actions { display:none; gap:8px; }
    .sb-btn { flex:1; display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:9px 12px; border-radius:var(--r1); cursor:pointer; font-family:var(--sans); font-size:.8rem; font-weight:600; background:rgba(255,255,255,.06); border:1px solid var(--side-line); color:var(--side-fg); transition:all var(--t1); }
    .sb-btn:hover { background:rgba(255,255,255,.12); }
    .sb-btn:active { transform:scale(.97); }

    /* ── MAIN ── */
    .main { flex:1; margin-left:var(--sidew); min-width:0; display:flex; flex-direction:column; }
    .topbar { display:none; }
    .admin-bar { display:none; align-items:center; gap:10px; padding:11px 24px; background:var(--panel); border-bottom:1px solid var(--line); font-size:.8rem; flex-wrap:wrap; }
    .admin-bar strong { color:var(--ac); font-weight:700; }
    .admin-bar span { color:var(--dim); }
    .container { max-width:760px; margin:0 auto; width:100%; padding:34px 28px 72px; }

    /* ══ STEPPER inline ══ */
    .paso-indicator, .progress-wrap { display:none; align-items:flex-start; justify-content:space-between; background:var(--panel); border:1px solid var(--line); border-radius:var(--r3); padding:18px 12px 14px; margin-bottom:16px; box-shadow:var(--e1); position:relative; }
    .paso-indicator::before, .progress-wrap::before { content:''; position:absolute; top:calc(18px + 15px); height:2px; left:calc(12px + 11%); right:calc(12px + 11%); background:var(--line-2); z-index:0; }
    .paso, .progress-step { flex:1; display:flex; flex-direction:column; align-items:center; gap:7px; position:relative; z-index:1; min-width:0; }
    .paso-dot { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:.78rem; font-weight:700; border:1.5px solid var(--line-2); background:var(--panel); color:var(--dim); position:relative; z-index:2; transition:all var(--t2); flex-shrink:0; }
    .paso-name { font-size:.62rem; font-weight:600; color:var(--dim); text-align:center; line-height:1.25; transition:color var(--t2); }
    .paso.activo .paso-dot { background:var(--ac); border-color:var(--ac); color:#fff; box-shadow:0 0 0 4px var(--ac-glow); }
    .paso.activo .paso-name { color:var(--ac); font-weight:700; }
    .paso.completo .paso-dot { background:var(--ok); border-color:var(--ok); color:#fff; }
    .paso.completo .paso-name { color:var(--ok); }
    .paso.completo::after { content:''; position:absolute; top:15px; left:50%; right:-50%; height:2px; background:var(--ok); z-index:1; }
    .paso:last-child::after { display:none; }

    /* ══ CARD ══ */
    .card { background:var(--panel); border:1px solid var(--line); border-radius:var(--r3); padding:24px; margin-bottom:14px; box-shadow:var(--e2); }
    .card h2 { font-size:1.05rem; font-weight:700; color:var(--fg); letter-spacing:-.02em; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--line); }
    .card-title { font-size:.66rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--line); }

    /* ══ CARD ESTABLECIMIENTO ══ */
    .card-establecimiento { background:var(--panel); border:1px solid var(--line); border-radius:var(--r3); padding:0; margin-bottom:14px; box-shadow:var(--e2); overflow:hidden; position:relative; }
    .card-establecimiento::before { content:''; position:absolute; top:0; left:0; bottom:0; width:3px; background:linear-gradient(180deg, var(--ac), var(--ac-2)); }
    .ce-head { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:14px 20px; border-bottom:1px solid var(--line); background:var(--panel-2); }
    .ce-head-tags { display:flex; align-items:center; gap:7px; }
    .ce-tag { font-size:.62rem; font-weight:700; letter-spacing:.05em; color:var(--sub); background:var(--bg-2); padding:4px 10px; border-radius:var(--rf); border:1px solid var(--line); }
    .ce-mes { font-size:.62rem; font-weight:700; letter-spacing:.05em; color:#fff; background:linear-gradient(135deg, var(--ac), var(--ac-2)); padding:4px 12px; border-radius:var(--rf); box-shadow:0 2px 8px var(--ac-glow); }
    .ce-body { padding:18px 20px 20px; }
    .ce-row { display:flex; align-items:flex-start; gap:14px; }
    .ce-ico { width:42px; height:42px; border-radius:11px; flex-shrink:0; background:linear-gradient(135deg, rgba(99,102,241,.14), rgba(99,102,241,.05)); border:1px solid rgba(99,102,241,.2); color:var(--ac); display:flex; align-items:center; justify-content:center; font-size:1.1rem; }
    .ce-k { font-size:.62rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); margin-bottom:4px; }
    .ce-dir { font-size:1.2rem; font-weight:700; line-height:1.25; letter-spacing:-.02em; color:var(--fg); }
    .ce-ciudad { font-size:.82rem; color:var(--sub); margin-top:3px; }
    .ce-rule { height:1px; background:var(--line); margin:16px 0; }
    .ce-fechas { display:flex; align-items:center; gap:10px; }
    .ce-fecha-v { font-family:var(--mono); font-size:1rem; font-weight:600; color:var(--fg); }
    .ce-arrow { color:var(--dim); font-size:1.05rem; margin:0 4px; }

    .tipo-seccion { display:inline-flex; align-items:center; gap:8px; font-size:.72rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--ac); background:rgba(99,102,241,.08); border:1px solid rgba(99,102,241,.22); padding:9px 16px; border-radius:var(--rf); margin-bottom:14px; }
    .tipo-seccion::before { content:''; width:7px; height:7px; border-radius:50%; background:var(--ac); box-shadow:0 0 8px var(--ac-glow); }

    /* ══ PROGRESO ══ */
    .progreso-tareas { background:var(--panel); border:1px solid var(--line); border-radius:var(--r3); padding:18px 20px; margin-bottom:14px; box-shadow:var(--e1); }
    .progreso-tareas-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:11px; }
    .progreso-tareas-label { font-size:.88rem; font-weight:600; color:var(--fg); }
    .progreso-tareas-num { font-family:var(--mono); font-size:.92rem; font-weight:700; color:var(--ac); }
    .progreso-bar-wrap { background:var(--bg-2); border-radius:var(--rf); height:7px; overflow:hidden; }
    .progreso-bar-fill { height:100%; border-radius:var(--rf); width:0; background:linear-gradient(90deg, var(--ac), var(--ac-2)); transition:width .45s cubic-bezier(.4,0,.2,1); box-shadow:0 0 12px var(--ac-glow); }
    .progreso-bar-fill.completo { background:linear-gradient(90deg, var(--ok), var(--ok-2)); box-shadow:0 0 12px rgba(16,185,129,.4); }
    .progreso-tareas-estado { font-size:.76rem; color:var(--dim); margin-top:9px; }

    /* ══ TAREA ══ */
    .tarea-card { background:var(--panel); border:1px solid var(--line); border-radius:var(--r3); overflow:hidden; margin-bottom:12px; box-shadow:var(--e2); transition:box-shadow var(--t2), border-color var(--t2); }
    .tarea-card:hover { box-shadow:var(--e3); border-color:var(--line-2); }
    .tarea-header { display:flex; align-items:center; gap:10px; padding:14px 16px 13px; border-bottom:1px solid var(--line); background:var(--panel-2); }
    .clave { font-family:var(--mono); font-size:.7rem; font-weight:700; letter-spacing:.03em; background:linear-gradient(135deg, var(--ac), var(--ac-2)); color:#fff; padding:5px 10px; border-radius:var(--r1); flex-shrink:0; box-shadow:0 2px 8px var(--ac-glow); }
    .texto { font-weight:700; font-size:.9rem; color:var(--fg); flex:1; letter-spacing:-.01em; }
    .contador { font-family:var(--mono); font-size:.66rem; font-weight:600; color:var(--sub); background:var(--bg-2); border:1px solid var(--line); padding:3px 9px; border-radius:var(--rf); flex-shrink:0; }
    .tarea-rutina { padding:13px 16px; font-size:.8rem; color:var(--sub); line-height:1.6; border-bottom:1px solid var(--line); background:var(--panel-2); }
    .tarea-respuesta { padding:15px 16px; }
    .tarea-respuesta > label { display:block; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--dim); margin-bottom:11px; }
    .respuesta-opciones { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:12px; }
    .opcion-btn { padding:9px 15px; border:1.5px solid var(--field-line); border-radius:var(--r1); background:var(--field); font-family:var(--sans); font-size:.82rem; font-weight:600; cursor:pointer; color:var(--sub); transition:all var(--t1); min-height:44px; -webkit-tap-highlight-color:transparent; }
    .opcion-btn:hover { border-color:var(--ac); color:var(--ac); background:rgba(99,102,241,.06); }
    .opcion-btn:active { transform:scale(.97); }
    .opcion-btn.selected { background:var(--ac); color:#fff; border-color:var(--ac); box-shadow:0 2px 12px var(--ac-glow); }
    .opcion-btn.selected-na { background:var(--bg-2); color:var(--sub); border-color:var(--line-2); }
    .opcion-btn.selected-informe { background:#0e7490; color:#fff; border-color:#0e7490; }

    /* ══ MES / MODO / TIPOS ══ */
    .mes-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .mes-card { background:var(--panel); border:1.5px solid var(--line); border-radius:var(--r3); padding:28px 16px 22px; text-align:center; cursor:pointer; transition:all var(--t2); }
    .mes-card:hover { border-color:var(--ac); transform:translateY(-3px); box-shadow:var(--e3); }
    .mes-card:active { transform:translateY(-1px); }
    .mes-icono { font-size:2rem; margin-bottom:10px; display:block; }
    .mes-nombre { font-size:1.12rem; font-weight:700; color:var(--fg); letter-spacing:-.01em; }
    .mes-anio { font-size:.74rem; color:var(--dim); font-family:var(--mono); margin-top:4px; }
    .modo-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .modo-card { background:var(--panel); border:1.5px solid var(--line); border-radius:var(--r3); padding:22px 18px; cursor:pointer; transition:all var(--t2); display:flex; flex-direction:column; gap:8px; }
    .modo-card:hover { border-color:var(--ac); transform:translateY(-2px); box-shadow:var(--e3); }
    .modo-card:active { transform:translateY(0); }
    .modo-icono { font-size:1.7rem; }
    .modo-titulo { font-size:.95rem; font-weight:700; color:var(--fg); letter-spacing:-.01em; }
    .modo-desc { font-size:.78rem; color:var(--sub); line-height:1.45; }
    .tipos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px; margin-bottom:18px; }
    .tipo-card { display:flex; align-items:center; gap:8px; padding:12px 14px; border:1.5px solid var(--line); border-radius:var(--r1); cursor:pointer; font-size:.84rem; font-weight:600; color:var(--sub); background:var(--panel); transition:all var(--t1); }
    .tipo-card:hover { border-color:var(--ac); color:var(--ac); transform:translateY(-1px); box-shadow:var(--e2); }
    .tipo-icono { font-size:1.15rem; flex-shrink:0; }

    /* ══ BUSCAR ══ */
    .buscar-wrap, .buscar-colegio-wrap { position:relative; margin-bottom:14px; }
    .buscar-wrap input, .buscar-colegio-wrap input { width:100%; padding:12px 14px 12px 42px !important; border:1.5px solid var(--field-line); border-radius:var(--r1); font-size:.92rem; font-family:var(--sans); background:var(--field); color:var(--fg); transition:border-color var(--t1), box-shadow var(--t1); -webkit-appearance:none; box-sizing:border-box; }
    .buscar-wrap input:focus, .buscar-colegio-wrap input:focus { outline:none; border-color:var(--ac); box-shadow:0 0 0 3px var(--ac-glow); }
    .buscar-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:1rem; color:var(--dim); pointer-events:none; z-index:2; line-height:1; }

    /* ══ COLEGIOS ══ */
    .colegios-grid { display:flex; flex-direction:column; gap:7px; max-height:440px; overflow-y:auto; padding-right:4px; }
    .colegios-grid::-webkit-scrollbar { width:5px; }
    .colegios-grid::-webkit-scrollbar-thumb { background:var(--line-2); border-radius:4px; }
    .colegio-card { display:flex; align-items:center; gap:12px; padding:14px 16px; border:1.5px solid var(--line); border-radius:var(--r1); cursor:pointer; background:var(--panel); transition:all var(--t1); }
    .colegio-card:hover { border-color:var(--ac); transform:translateX(3px); }
    .colegio-icono { font-size:1.2rem; flex-shrink:0; }
    .colegio-nombre { flex:1; font-size:.88rem; font-weight:600; color:var(--fg); }
    .colegio-flecha { color:var(--dim); font-size:1.1rem; transition:transform var(--t1); }
    .colegio-card:hover .colegio-flecha { transform:translateX(3px); color:var(--ac); }

    /* ══ HOJAS ══ */
    .hoja-item, .colegio-tipo-item { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:16px 18px; border:1.5px solid var(--line); border-radius:var(--r1); margin-bottom:8px; cursor:pointer; background:var(--panel); transition:all var(--t1); }
    .hoja-item:hover, .colegio-tipo-item:hover { border-color:var(--ac); box-shadow:var(--e2); transform:translateY(-1px); }
    .hoja-item.realizada, .colegio-tipo-item.realizada { border-color:rgba(16,185,129,.4); background:rgba(16,185,129,.06); cursor:default; }
    .hoja-item.realizada:hover, .colegio-tipo-item.realizada:hover { transform:none; box-shadow:none; }
    .hoja-tipo { font-weight:700; font-size:.9rem; color:var(--fg); }
    .hoja-info { font-size:.74rem; color:var(--dim); margin-top:3px; font-family:var(--mono); }
    .hoja-badge { background:rgba(99,102,241,.1); color:var(--ac); font-size:.72rem; font-weight:700; padding:5px 12px; border-radius:var(--rf); white-space:nowrap; flex-shrink:0; border:1px solid rgba(99,102,241,.22); }
    .badge-realizada { background:rgba(16,185,129,.12); color:var(--ok); border-color:rgba(16,185,129,.3); }

    /* ══ ORDEN HEADER legacy ══ */

    .orden-meta { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; border-top:1px solid var(--line); padding-top:14px; }
    .orden-meta-item span { display:block; font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--dim); margin-bottom:3px; }
    .orden-meta-item strong { font-family:var(--mono); font-size:.8rem; font-weight:500; color:var(--fg); }
    .orden-tipo-label { display:inline-flex; align-items:center; gap:6px; font-size:.8rem; font-weight:700; color:var(--ac); background:rgba(99,102,241,.08); border:1.5px solid rgba(99,102,241,.22); padding:7px 14px; border-radius:var(--r1); margin-bottom:16px; }

    /* ══ FORMS ══ */
    label { display:block; font-size:.78rem; font-weight:600; color:var(--sub); margin-bottom:7px; }
    input[type="text"], textarea, select { width:100%; padding:11px 14px; border:1.5px solid var(--field-line); border-radius:var(--r1); font-size:.92rem; font-family:var(--sans); background:var(--field); color:var(--fg); transition:border-color var(--t1), box-shadow var(--t1); -webkit-appearance:none; }
    input:focus, textarea:focus, select:focus { outline:none; border-color:var(--ac); box-shadow:0 0 0 3px var(--ac-glow); }
    textarea { min-height:88px; resize:vertical; line-height:1.55; }
    .firmante { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .dates { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    /* ══ BOTONES ══ */
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:12px 24px; border-radius:var(--r1); font-family:var(--sans); font-size:.88rem; font-weight:700; cursor:pointer; border:1.5px solid transparent; transition:all var(--t1); text-decoration:none; min-height:48px; -webkit-tap-highlight-color:transparent; line-height:1.3; letter-spacing:-.005em; }
    .btn:disabled { opacity:.5; cursor:not-allowed; pointer-events:none; }
    .btn:active:not(:disabled) { transform:scale(.97); }
    .btn-primary { background:var(--ac); color:#fff; border-color:var(--ac); box-shadow:0 4px 16px var(--ac-glow); }
    .btn-primary:hover { background:var(--ac-2); box-shadow:0 6px 20px var(--ac-glow); }
    .btn-success { background:var(--ok); color:#fff; border-color:var(--ok); box-shadow:0 4px 16px rgba(16,185,129,.3); }
    .btn-success:hover { background:var(--ok-2); }
    .btn-warning { background:var(--warn); color:#fff; border-color:var(--warn); }
    .btn-warning:hover { filter:brightness(1.05); }
    .btn-back { background:var(--panel); color:var(--sub); border-color:var(--line-2); }
    .btn-back:hover { background:var(--bg-2); border-color:var(--dim); color:var(--fg); }
    .btn-danger { background:var(--panel); color:var(--bad); border-color:rgba(244,63,94,.4); }
    .btn-danger:hover { background:rgba(244,63,94,.08); }
    .btn-sm { display:inline-flex; align-items:center; gap:5px; padding:7px 14px; font-size:.78rem; font-weight:700; border-radius:var(--rf); font-family:var(--sans); cursor:pointer; border:1.5px solid transparent; transition:all var(--t1); min-height:36px; -webkit-tap-highlight-color:transparent; }
    .btn-sm:active { transform:scale(.96); }
    .btn-sm-primary { background:var(--ac); color:#fff; border-color:var(--ac); }
    .btn-sm-primary:hover { background:var(--ac-2); }
    .btn-sm-warning { background:var(--warn); color:#fff; border-color:var(--warn); }

    /* ══ FEEDBACK ══ */
    .loading { text-align:center; color:var(--dim); padding:36px 0; font-size:.9rem; }
    .loading::before { content:''; display:block; width:32px; height:32px; border:3px solid var(--line); border-top-color:var(--ac); border-radius:50%; animation:spin .65s linear infinite; margin:0 auto 12px; }

    @keyframes spin { to { transform:rotate(360deg); } }
    .error-msg { background:rgba(244,63,94,.08); border:1.5px solid rgba(244,63,94,.35); color:var(--bad); padding:12px 16px; border-radius:var(--r1); font-size:.875rem; font-weight:500; margin-top:10px; }

    /* ══ TOAST ══ */
    .toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--side); color:#fff; padding:13px 24px; border-radius:var(--rf); font-size:.875rem; font-weight:600; z-index:9999; transition:opacity .3s; max-width:calc(100vw - 32px); white-space:nowrap; box-shadow:var(--e4); text-align:center; border:1px solid var(--side-line); }

    /* ══ MODALES ══ */
    .modal-overlay { position:fixed; inset:0; background:rgba(5,7,12,.7); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); z-index:700; display:flex; align-items:center; justify-content:center; padding:20px; }

    .enviando-spinner { width:48px; height:48px; border:4px solid var(--line); border-top-color:var(--ac); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 20px; }

    .enviando-exito-icon { width:48px; height:48px; border-radius:50%; background:rgba(16,185,129,.1); border:3px solid rgba(16,185,129,.3); display:flex; align-items:center; justify-content:center; font-size:1.5rem; margin:0 auto 20px; animation:popIn .3s ease; color:var(--ok); }
    @keyframes popIn { 0%{transform:scale(.5);opacity:0;} 70%{transform:scale(1.1);} 100%{transform:scale(1);opacity:1;} }

    /* ══ BIENVENIDA ══ */
    .bienvenida-hero { background: radial-gradient(700px 240px at 80% -60px, rgba(99,102,241,.22), transparent 70%), linear-gradient(160deg, var(--side) 0%, var(--side-2) 100%); border:1px solid var(--side-line); border-radius:var(--r4); padding:44px 28px 36px; color:#fff; margin-bottom:14px; position:relative; overflow:hidden; text-align:center; box-shadow:var(--e3); }
    .bienvenida-hero::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg, transparent, var(--ac), transparent); }
    .bienvenida-logo { display:inline-flex; align-items:center; gap:11px; margin-bottom:22px; position:relative; z-index:1; }
    .bienvenida-logo-badge { width:42px; height:42px; border-radius:11px; background:linear-gradient(135deg, var(--ac), var(--ac-2)); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:1rem; font-weight:700; color:#fff; box-shadow:0 6px 20px var(--ac-glow); }
    .bienvenida-logo-empresa { font-size:.9rem; font-weight:600; color:rgba(255,255,255,.7); }
    .bienvenida-titulo { font-size:1.6rem; font-weight:800; margin-bottom:8px; position:relative; z-index:1; line-height:1.2; letter-spacing:-.03em; }
    .bienvenida-sub { font-size:.88rem; color:rgba(255,255,255,.66); margin-bottom:28px; position:relative; z-index:1; line-height:1.6; }
    .bienvenida-btn { display:inline-flex; align-items:center; gap:8px; padding:14px 30px; background:var(--ac); color:#fff; border:none; border-radius:var(--r1); font-family:var(--sans); font-size:1rem; font-weight:700; cursor:pointer; transition:all var(--t1); position:relative; z-index:1; box-shadow:0 8px 24px var(--ac-glow); }
    .bienvenida-btn:hover { transform:translateY(-2px); background:var(--ac-2); box-shadow:0 10px 30px var(--ac-glow); }
    .bienvenida-btn:active { transform:translateY(0); }
    .bienvenida-features { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
    .bienvenida-feature { background:var(--panel); border:1px solid var(--line); border-radius:var(--r3); padding:18px 14px; text-align:center; box-shadow:var(--e1); }

    .bienvenida-feature-desc { font-size:.72rem; color:var(--dim); line-height:1.4; }
    .bienvenida-footer { background:var(--panel); border:1px solid var(--line); border-radius:var(--r3); padding:14px 18px; display:flex; align-items:center; gap:12px; box-shadow:var(--e1); }
    .bienvenida-footer-icono { font-size:1.4rem; flex-shrink:0; }
    .bienvenida-footer-texto { font-size:.78rem; color:var(--sub); line-height:1.5; }
    .bienvenida-footer-texto strong { color:var(--fg); }

    /* ══ BANNER ══ */
    .progreso-banner { background:rgba(245,158,11,.08); border:1.5px solid rgba(245,158,11,.35); border-radius:var(--r3); padding:16px 18px; margin-bottom:14px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
    .progreso-banner-info { flex:1; min-width:180px; }

    .progreso-banner-sub { font-size:.78rem; color:var(--sub); }
    .progreso-banner-acciones { display:flex; gap:8px; flex-wrap:wrap; }

    /* ══ PIN ══ */
    .pin-overlay { position:fixed; inset:0; background:rgba(5,7,12,.86); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); z-index:500; display:flex; align-items:center; justify-content:center; padding:20px; }
    .pin-card { background:var(--panel); border:1px solid var(--line); border-radius:var(--r3); padding:36px 32px; width:100%; max-width:340px; box-shadow:var(--e4); text-align:center; }
    .pin-icon { font-size:2.2rem; margin-bottom:12px; }
    .pin-title { font-size:1.1rem; font-weight:700; color:var(--fg); margin-bottom:6px; }
    .pin-sub { font-size:.82rem; color:var(--dim); margin-bottom:24px; }
    .pin-dots { display:flex; justify-content:center; gap:12px; margin-bottom:24px; }
    .pin-dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--line-2); background:transparent; transition:all var(--t1); }

    .pin-numpad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:12px; }
    .pin-btn { background:var(--field); border:1.5px solid var(--field-line); border-radius:var(--r1); padding:16px; font-size:1.2rem; font-weight:700; font-family:var(--mono); cursor:pointer; color:var(--fg); transition:all var(--t1); min-height:56px; }
    .pin-btn:hover { background:rgba(99,102,241,.08); border-color:var(--ac); color:var(--ac); }
    .pin-btn:active { transform:scale(.94); }
    .pin-btn.borrar { font-size:.85rem; font-family:var(--sans); color:var(--dim); }
    .pin-error-msg { font-size:.8rem; color:var(--bad); font-weight:600; min-height:20px; }

    /* ══ EXPORT ══ */
    .btn-export { display:inline-flex; align-items:center; gap:7px; padding:9px 18px; background:var(--ok); color:#fff; border:none; border-radius:var(--rf); font-family:var(--sans); font-size:.85rem; font-weight:600; cursor:pointer; transition:all var(--t1); box-shadow:0 2px 8px rgba(16,185,129,.25); }
    .btn-export:hover { background:var(--ok-2); }
    .btn-export:active { transform:scale(.97); }

    /* ══ ADMIN ══ */

    @media (max-width:900px) {

    @media (max-width:480px) {

// ── fetch con timeout y reintentos ───────────────────────────
async function fetchConTimeout(url, opciones = {}, timeoutMs = 10000, reintentos = 2) {
  let ultimoError;
  for (let intento = 0; intento <= reintentos; intento++) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const res = await fetch(url, { ...opciones, signal: controller.signal });
      clearTimeout(timer);
      return res;
    } catch (e) {
      clearTimeout(timer);
      ultimoError = e.name === "AbortError"
        ? new Error("Sin conexión — la solicitud tardó demasiado. Verificá tu señal e intentá de nuevo.")
        : new Error("Error de red. Verificá tu conexión a internet.");
      if (intento < reintentos) await new Promise(r => setTimeout(r, 1000 * (intento + 1)));
    }
  }
  throw ultimoError;
}

async function sbGet(tabla, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.set("tabla", tabla);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetchConTimeout(url.toString());
  if (!res.ok) throw new Error("Error al leer datos (" + res.status + "). Intentá de nuevo.");
  return res.json();
}

async function sbPost(tabla, body) {
  const url = new URL(API_URL);

    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error("Error al guardar (" + res.status + "). Intentá de nuevo.");
  return { ok: true };
}

async function getHojas(domicilio) {
  const data = await sbGet("colegios_hojas", {
    select: "orden,orden_principal,texto_breve,fecha_fin",
    domicilio: `eq.${domicilio}`,
    mes: `eq.${estado.mes}`
  });

  const hojas = {};
  for (const r of data) {
    const key = r.orden_principal && r.orden_principal !== r.orden
                  ? r.orden_principal : r.orden;
    if (!hojas[key]) {
      hojas[key] = { ordenPpal: key, tipo: r.texto_breve, fechaFin: r.fecha_fin, ordenes: [] };
    }
    if (!hojas[key].ordenes.includes(r.orden)) hojas[key].ordenes.push(r.orden);
  }

  let ordenesRespondidas = new Set();
  const respData = await sbGet("respuestas", {
    select: "orden_ref",
    domicilio: `eq.${domicilio}`
  });
  respData.forEach(r => ordenesRespondidas.add(String(r.orden_ref)));

  const todasOrdenes = Object.values(hojas).flatMap(h => h.ordenes);
  let conteoClaves = {};
  if (todasOrdenes.length > 0) {
    const dataClaves = await sbGet("claves_tareas", {
      select: "orden",
      orden: `in.(${todasOrdenes.join(",")})`,
      mes: `eq.${estado.mes}`
    });
    const ordenAPpal = {};
    Object.values(hojas).forEach(h => {
      h.ordenes.forEach(o => { ordenAPpal[String(o)] = String(h.ordenPpal); });
    });
    dataClaves.forEach(r => {
      const ppal = ordenAPpal[String(r.orden)] || String(r.orden);
      conteoClaves[ppal] = (conteoClaves[ppal] || 0) + 1;
    });
  }

  // Buscar MEINs creadas para estas ordenes
  const todasOrdenesPpal = Object.values(hojas).map(h => h.ordenPpal);
  let meinMap = {};
  if (todasOrdenesPpal.length > 0) {
    try {
      const dataMeins = await sbGet("meins_pendientes", {
        select: "orden,mein_creada",
        orden:  `in.(${todasOrdenesPpal.join(",")})`,
        estado: "eq.creada"
      });
      dataMeins.forEach(r => {
        // Solo guardar si mein_creada es diferente a la orden (MEIN real)
        if (r.mein_creada && String(r.mein_creada) !== String(r.orden)) {
          meinMap[String(r.orden)] = r.mein_creada;
        }
      });
    } catch (_) { /* silencioso intencional */ }
  }

  const lista = Object.values(hojas).map(h => ({
    ordenPpal:  h.ordenPpal,
    tipo:       h.tipo,
    fechaFin:   h.fechaFin,
    cantTareas: conteoClaves[String(h.ordenPpal)] || h.ordenes.length,
    ordenes:    h.ordenes,
    mein:       meinMap[String(h.ordenPpal)] || "Pendiente",
    // Realizada si CUALQUIERA de sus ordenes individuales fue respondida
    realizada:  h.ordenes.some(o => ordenesRespondidas.has(String(o)))
  }));

  return { ok: true, hojas: lista };
}

async function getTareas(ordenPpal, ordenesYaCalculadas) {
  let ordenes = ordenesYaCalculadas && ordenesYaCalculadas.length > 0
                  ? ordenesYaCalculadas : null;
  let fechaInicio = "";
  let fechaFin    = "";

  if (!ordenes) {
    const dataHojas = await sbGet("colegios_hojas", {
      select: "orden,fecha_inicio,fecha_fin",
      orden_principal: `eq.${ordenPpal}`
    });
    ordenes     = dataHojas.map(r => r.orden);
    fechaInicio = dataHojas[0]?.fecha_inicio || "";
    fechaFin    = dataHojas[0]?.fecha_fin    || "";
    if (ordenes.length === 0) ordenes = [ordenPpal];
  } else {
    const dataFechas = await sbGet("colegios_hojas", {
      select: "fecha_inicio,fecha_fin",
      orden: `eq.${ordenesYaCalculadas[0]}`
    });
    fechaInicio = dataFechas[0]?.fecha_inicio || "";
    fechaFin    = dataFechas[0]?.fecha_fin    || "";
  }

  const dataClaves = await sbGet("claves_tareas", {
    select: "orden,clave,texto_breve,descripcion,orden_fila",
    orden: `in.(${ordenes.join(",")})`,
    order: "orden_fila.asc"
  });

  const tareas = dataClaves.map(r => ({
    orden: r.orden, clave: r.clave,
    texto: r.texto_breve, descripcion: r.descripcion
  }));

  // Buscar MEIN en meins_pendientes
  let mein = "Pendiente";
  try {
    const dataMein = await sbGet("meins_pendientes", {
      select: "mein_creada",
      orden: `eq.${ordenPpal}`,
      estado: "eq.creada"
    });
    if (dataMein && dataMein.length > 0 && dataMein[0].mein_creada) {
      const meinCreada = String(dataMein[0].mein_creada);
      // Si mein_creada es igual a la orden, no es una MEIN real
      if (meinCreada !== String(ordenPpal)) {
        mein = meinCreada;
      }
    }
  } catch (_) { /* silencioso intencional */ }

  // Si sigue sin MEIN real, buscar en respuestas (columna mein)
  if (mein === "Pendiente") {
    try {
      const dataResp = await sbGet("respuestas", {
        select: "mein",
        orden_ref: `eq.${ordenPpal}`,
        limit: "1"
      });
      if (dataResp && dataResp.length > 0 && dataResp[0].mein) {
        const meinResp = String(dataResp[0].mein);
        // Solo usar si es diferente a la orden
        if (meinResp !== String(ordenPpal)) {
          mein = meinResp;
        }
      }
    } catch (_) { /* silencioso intencional */ }
  }

  return { ok: true, tareas, fechaInicio, fechaFin, mein };
}

function actualizarProgreso() {
  const wrap = document.getElementById("progreso-tareas-wrap");
  if (!wrap) return;

  const total = estado.tareas.length;
  if (total === 0) return;

  const completadas = Object.values(estado.respuestas).filter(r =>
    r && (r.texto || r.opcion)
  ).length;

  const pct = Math.round((completadas / total) * 100);
  const fill = document.getElementById("progreso-bar-fill");
  const num  = document.getElementById("progreso-tareas-num");
  const est  = document.getElementById("progreso-tareas-estado");

  if (fill) {
    fill.style.width = pct + "%";
    if (completadas === total) {
      fill.classList.add("completo");
    } else {
      fill.classList.remove("completo");
    }
  }
  if (num) num.textContent = completadas + " / " + total;
  if (est) {
    if (completadas === 0) {
      est.textContent = "Ninguna tarea completada aún";
    } else if (completadas === total) {
      est.textContent = "✓ Todas las tareas completadas — podés enviar";
      est.style.color = "var(--success)";
      est.style.fontWeight = "600";
    } else {
      est.textContent = (total - completadas) + " tarea(s) pendiente(s)";
      est.style.color = "var(--muted)";
      est.style.fontWeight = "400";
    }
  }
}

const STORAGE_KEY = "mepl_progreso";

function guardarProgreso() {
  if (!estado.hojaSeleccionada || !estado.domicilio) return;
  const datos = {
    mes:              estado.mes,
    modo:             estado.modo,
    domicilio:        estado.domicilio,
    hojaSeleccionada: estado.hojaSeleccionada,
    tareas:           estado.tareas,
    respuestas:       estado.respuestas,
    operario:         estado.operario,
    jefe:             estado.jefe,
    observaciones:    estado.observaciones,
    fechaInicio:      estado.fechaInicio,
    fechaFin:         estado.fechaFin,
    mein:             estado.mein || "",
    timestamp:        Date.now()
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(datos)); } catch(_) {}
}

function limpiarProgreso() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(_) {}
}

function cargarProgresoGuardado() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const datos = JSON.parse(raw);
    // Expirar después de 24 horas
    if (Date.now() - datos.timestamp > 86400000) { limpiarProgreso(); return null; }
    return datos;
  } catch(_) { return null; }
}

function mostrarBannerProgreso(datos, app) {
  const hace = Math.round((Date.now() - datos.timestamp) / 60000);
  const cuandoStr = hace < 60
    ? `hace ${hace} minuto${hace !== 1 ? "s" : ""}`
    : `hace ${Math.round(hace / 60)} hora${Math.round(hace/60) !== 1 ? "s" : ""}`;

  const respuestas = Object.keys(datos.respuestas || {}).length;
  const total      = (datos.tareas || []).length;

  const banner = document.createElement("div");
  banner.className = "progreso-banner";
  banner.id = "progreso-banner";
  banner.innerHTML = `
    <div class="progreso-banner-info">
      <div class="progreso-banner-titulo">📝 Formulario incompleto guardado</div>
      <div class="progreso-banner-sub">
        ${esc(datos.domicilio)} — ${esc(datos.hojaSeleccionada?.tipo || "")}
        · ${respuestas}/${total} tareas completadas · ${cuandoStr}
      </div>
    </div>
    <div class="progreso-banner-acciones">
      <button class="btn btn-warning" onclick="continuarProgreso()">Continuar</button>
      <button class="btn btn-back" onclick="descartarProgreso()">Descartar</button>
    </div>`;
  app.insertBefore(banner, app.firstChild);
}

function continuarProgreso() {
  const datos = cargarProgresoGuardado();
  if (!datos) return;
  // Restaurar estado completo
  estado.mes             = datos.mes;
  estado.modo            = datos.modo;
  estado.domicilio       = datos.domicilio;
  estado.hojaSeleccionada = datos.hojaSeleccionada;
  estado.tareas          = datos.tareas;
  estado.respuestas      = datos.respuestas;
  estado.operario        = datos.operario;
  estado.jefe            = datos.jefe;
  estado.observaciones   = datos.observaciones;
  estado.fechaInicio     = datos.fechaInicio;
  estado.fechaFin        = datos.fechaFin;
  estado.mein            = datos.mein || "";
  estado.paso            = 3;
  estado.vista           = "formulario";
  const banner = document.getElementById("progreso-banner");
  if (banner) banner.remove();
  render();
  // Restaurar respuestas visuales después del render
  // Esperar al siguiente frame del navegador para restaurar
  requestAnimationFrame(() => requestAnimationFrame(restaurarRespuestasVisuales));
}

function restaurarRespuestasVisuales() {
  Object.entries(estado.respuestas).forEach(([key, r]) => {
    const txt = document.getElementById("txt_" + key);
    if (txt) txt.value = r.texto || "";
    // Restaurar botón seleccionado
    const btnContainer = txt?.closest(".tarea-respuesta")?.querySelector(".respuesta-opciones");
    if (!btnContainer || !r.opcion) return;
    btnContainer.querySelectorAll(".opcion-btn").forEach(btn => {
      const esNA      = r.opcion === "No aplica" || r.opcion === "En obra";
      const esInforme = r.opcion === "se adjunta informe de consumo";
      if (btn.textContent.trim() === r.opcion) {
        btn.classList.add(esNA ? "selected-na" : esInforme ? "selected-informe" : "selected");
      }
    });
  });
  // Restaurar operario y jefe
  const inpOp = document.getElementById("inp-operario");
  const inpJe = document.getElementById("inp-jefe");
  const inpObs = document.getElementById("inp-observaciones");
  if (inpOp)  inpOp.value  = estado.operario || "";
  if (inpJe)  inpJe.value  = estado.jefe     || "";
  if (inpObs) inpObs.value = estado.observaciones || "";
  actualizarProgreso();
}

function descartarProgreso() {
  limpiarProgreso();
  const banner = document.getElementById("progreso-banner");
  if (banner) banner.remove();
}

  let h = '<div class="sb-steps-line"></div>';
  pasos.forEach((p, i) => {
    const cls = i + 1 === estado.paso ? "activo" : i + 1 < estado.paso ? "completo" : "";
    const dot = (i + 1 < estado.paso) ? "\u2713" : (i + 1);
    h += `<div class="sb-step ${cls}"><span class="sb-step-dot">${dot}</span><span class="sb-step-name">${p}</span></div>`;
  });
  nav.innerHTML = h;
  nav.style.display = "flex";
}

function render() {
  const app = document.getElementById("app");

  if (estado.vista === "admin") {
    renderAdmin();
    return;
  }

  const btnInicio = document.getElementById("btn-inicio");
  const btnVolver = document.getElementById("btn-volver");
  if (btnInicio) btnInicio.style.display = "inline-flex";
  if (btnVolver) btnVolver.style.display = "inline-flex";

  if (estado.paso === -2) { app.innerHTML = ""; renderBienvenida(); return; }
  if (estado.paso === -1) { app.innerHTML = ""; renderSelectorMes(); return; }
  if (estado.paso === 0)  { app.innerHTML = ""; renderModo(); return; }

  const pasos = estado.modo === "tipo"
    ? ["Tipo", "Colegio", "Respuestas", "Confirmación"]
    : ["Colegio", "Hoja", "Respuestas", "Confirmación"];

  let html = `<div class="paso-indicator">`;
  pasos.forEach((p, i) => {
    const cls = i + 1 === estado.paso ? "activo" : i + 1 < estado.paso ? "completo" : "";
    const dot = (i + 1 < estado.paso) ? "\u2713" : (i + 1);
    html += `<div class="paso ${cls}"><span class="paso-dot">${dot}</span><span class="paso-name">${p}</span></div>`;
  });
  html += `</div>`;
  app.innerHTML = html;
  pintarSidebarSteps(pasos);

  if (estado.modo === "tipo") {
    if      (estado.paso === 1) renderTipos();
    else if (estado.paso === 2) renderColegiosPorTipo();
    else if (estado.paso === 3) { if (estado.tareas && estado.tareas.length > 0) renderFormularioTareas(); }
    else if (estado.paso === 4) renderConfirmacion();
  } else {
    if      (estado.paso === 1) renderColegios();
    else if (estado.paso === 2) renderHojas();
    else if (estado.paso === 3) { if (estado.tareas && estado.tareas.length > 0) renderFormularioTareas(); }
    else if (estado.paso === 4) renderConfirmacion();
  }
}

const ADMIN_PIN = "4158";

function irAdmin() {

function mostrarPinOverlay() {

  overlay.innerHTML = `
    <div class="pin-card">

        ).join("")}

}

function pinPresionar(digito) {
  if (pinIngresado.length >= 4) return;
  pinIngresado += digito;
  actualizarDots();
  if (pinIngresado.length === 4) {
    setTimeout(verificarPin, 150);
  }
}

function pinBorrar() {
  pinIngresado = pinIngresado.slice(0, -1);
  actualizarDots();
  document.getElementById("pin-error").textContent = "";
}

function actualizarDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById("pd" + i);
    if (!dot) return;
    dot.classList.toggle("filled", i < pinIngresado.length);
    dot.classList.remove("error");
  }
}

function verificarPin() {
  if (pinIngresado === ADMIN_PIN) {
    pinVerificado = true;
    pinCancelar();
    _abrirAdmin();
  } else {
    // Mostrar error
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById("pd" + i);
      if (dot) { dot.classList.remove("filled"); dot.classList.add("error"); }
    }
    document.getElementById("pin-error").textContent = "PIN incorrecto";
    setTimeout(() => {
      pinIngresado = "";
      actualizarDots();
      document.getElementById("pin-error").textContent = "";
    }, 1200);
  }
}

function pinCancelar() {
  const overlay = document.getElementById("pin-overlay");
  if (overlay) overlay.remove();
}

function _abrirAdmin() {
  estado.vista = "admin";
  document.getElementById("btn-inicio").style.display = "inline-flex";
  var _bv=document.getElementById("btn-volver"); if(_bv)_bv.style.display="none";
  render();
}

// adminMes arranca con el mes actual en español
const _mesesES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio",
                  "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
let adminMes = _mesesES[new Date().getMonth()];
let adminFiltro = "todos";
let adminDatos = [];

async function renderAdmin() {
  const app = document.getElementById("app");

  // Cargar meses disponibles dinámicamente
  let opcionesMeses = `<option value="">Cargando...</option>`;
  try {
    const dataMeses = await sbGet("colegios_hojas", { select: "mes" });
    const mesesDisp = [...new Set(dataMeses.map(r => r.mes).filter(Boolean))];

                   "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    mesesDisp.sort((a, b) => orden.indexOf(a) - orden.indexOf(b));
    // Si adminMes no está en la lista, usar el último
    if (!mesesDisp.includes(adminMes)) adminMes = mesesDisp[mesesDisp.length - 1] || adminMes;
    opcionesMeses = mesesDisp.map(m =>
      `<option value="${m}" ${adminMes===m?"selected":""}>${m} ${ANIO}</option>`
    ).join("");
  } catch(_) {
    opcionesMeses = `<option value="${adminMes}">${adminMes} ${ANIO}</option>`;
  }

  app.innerHTML = `
    <div class="card">
      <h2>⚙ Panel de MEINs — Creación masiva</h2>

      <div style="display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;">
        <label style="margin:0;font-weight:600;">Mes:</label>
        <select id="admin-mes-sel" style="width:auto;" onchange="adminMes=this.value;cargarAdmin()">
          ${opcionesMeses}
        </select>
        <button class="btn btn-primary" style="padding:8px 16px;font-size:0.85rem;" onclick="cargarAdmin()">↺ Actualizar</button>
        <button class="btn btn-warning" style="padding:8px 16px;font-size:0.85rem;" onclick="encolarTodos()">⚡ Encolar todos los pendientes</button>
        <button class="btn-export" id="btn-exportar" onclick="exportarReporte()">📥 Exportar Excel</button>
      </div>

      <div id="admin-stats" class="admin-stats"></div>
      <div class="admin-filtros" id="admin-filtros"></div>
      <div id="admin-lista"><div class="loading">Cargando colegios...</div></div>
    </div>`;

  await cargarAdmin();
}

async function cargarAdmin() {
  const listaEl   = document.getElementById("admin-lista");
  const statsEl   = document.getElementById("admin-stats");
  const filtrosEl = document.getElementById("admin-filtros");
  if (!listaEl) return;
  listaEl.innerHTML = `<div class="loading">Cargando...</div>`;

  try {
    // 1. Traer todos los colegios del mes
    const dataColegios = await sbGet("colegios_hojas", {
      select: "domicilio,orden,orden_principal,texto_breve",
      mes: `eq.${adminMes}`
    });

    // Agrupar por domicilio → solo órdenes ORIGINALES (orden = orden_principal o sin orden_principal)
    // Las MEINs creadas tienen orden != orden_principal y NO se cuentan
    const colegiosMap = {};
    for (const r of dataColegios) {
      const dom  = r.domicilio;
      const ord  = r.orden;
      const ppal = r.orden_principal;
      // Saltar MEINs creadas (tienen orden_principal distinto a orden)
      if (ppal && ppal !== ord) continue;
      if (!colegiosMap[dom]) colegiosMap[dom] = { domicilio: dom, ordenes: new Set() };
      colegiosMap[dom].ordenes.add(ord);
    }

    // 2. Traer MEINs creadas de meins_pendientes donde estado = 'creada'
    const pendientesData = await sbGet("meins_pendientes", {
      select: "*",
      mes: `eq.${adminMes}`
    });

    // Mapear orden → lista de registros en meins_pendientes
    const pendientesMap = {};
    pendientesData.forEach(p => {
      if (!pendientesMap[p.orden]) pendientesMap[p.orden] = [];
      pendientesMap[p.orden].push(p);
    });

    // 4. Construir lista de colegios con conteo real de MEINs
    adminDatos = Object.values(colegiosMap).map(c => {
      const ordenesList = [...c.ordenes];
      const total = ordenesList.length;

      // Contar cuántas órdenes tienen MEIN creada
      let creadas   = 0;
      let errores   = [];
      let enCola    = 0;
      let estadoCola = null;

      ordenesList.forEach(o => {
        const registros = pendientesMap[o] || [];
        // Tomar el último registro de cada orden
        const ultimo = registros[registros.length - 1];
        if (!ultimo) return;
        if (ultimo.estado === "creada")    creadas++;
        if (ultimo.estado === "error")     errores.push({ orden: o, tipo: ultimo.tipo, msg: ultimo.error_msg });
        if (ultimo.estado === "pendiente" || ultimo.estado === "procesando") enCola++;
        if (!estadoCola) estadoCola = ultimo.estado;
      });

      // Determinar estado general del colegio
      let estadoGeneral;
      if (creadas === total && total > 0)      estadoGeneral = "completo";
      else if (creadas > 0 && errores.length > 0) estadoGeneral = "parcial-error";
      else if (creadas > 0)                    estadoGeneral = "parcial";
      else if (errores.length > 0)             estadoGeneral = "error";
      else if (enCola > 0)                     estadoGeneral = "encolada";
      else                                     estadoGeneral = "sin-mein";

      return {
        domicilio:     c.domicilio,
        ordenes:       ordenesList,
        total,
        creadas,
        errores,
        enCola,
        estadoGeneral,
        estadoCola
      };
    }).sort((a, b) => a.domicilio.localeCompare(b.domicilio));

    // Stats
    const total      = adminDatos.length;
    const conMein    = adminDatos.filter(c => c.estadoGeneral === "completo").length;
    const sinMein    = adminDatos.filter(c => c.estadoGeneral === "sin-mein").length;
    const encoladas  = adminDatos.filter(c => c.estadoGeneral === "encolada").length;
    const parciales  = adminDatos.filter(c => c.estadoGeneral === "parcial" || c.estadoGeneral === "parcial-error").length;
    const conError   = adminDatos.filter(c => c.estadoGeneral === "error" || c.estadoGeneral === "parcial-error").length;

    if (statsEl) statsEl.innerHTML = `
      <div class="admin-stat-card"><div class="admin-stat-num">${total}</div><div class="admin-stat-label">Total colegios</div></div>
      <div class="admin-stat-card"><div class="admin-stat-num" style="color:var(--success)">${conMein}</div><div class="admin-stat-label">Completos</div></div>
      <div class="admin-stat-card"><div class="admin-stat-num" style="color:var(--warn)">${sinMein}</div><div class="admin-stat-label">Sin MEIN</div></div>
      <div class="admin-stat-card"><div class="admin-stat-num" style="color:var(--brand)">${encoladas}</div><div class="admin-stat-label">En cola</div></div>
      <div class="admin-stat-card"><div class="admin-stat-num" style="color:var(--warn)">${parciales}</div><div class="admin-stat-label">Parciales</div></div>
      <div class="admin-stat-card"><div class="admin-stat-num" style="color:var(--danger)">${conError}</div><div class="admin-stat-label">Con error</div></div>`;

    if (filtrosEl) filtrosEl.innerHTML = `
      <span style="font-size:0.82rem;color:#666;">Filtrar:</span>
      ${[["todos","Todos"],["sin-mein","Sin MEIN"],["encolada","En cola"],["con-mein","Con MEIN"],["error","Error"]]
        .map(([v,l]) => `<button class="filtro-btn ${adminFiltro===v?"activo":""}" onclick="setFiltroAdmin('${v}')">${l}</button>`).join("")}`;

    renderListaAdmin();

  } catch (e) {
    listaEl.innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
  }
}

function setFiltroAdmin(f) {
  adminFiltro = f;
  document.querySelectorAll(".filtro-btn").forEach(b => {
    b.classList.toggle("activo", b.textContent.toLowerCase().includes(f === "todos" ? "todos" : f));
  });
  renderListaAdmin();
}

function renderListaAdmin() {
  const listaEl = document.getElementById("admin-lista");
  if (!listaEl) return;

  let datos = adminDatos;
  if (adminFiltro === "sin-mein")  datos = datos.filter(c => c.estadoGeneral === "sin-mein");
  if (adminFiltro === "encolada")  datos = datos.filter(c => c.estadoGeneral === "encolada");
  if (adminFiltro === "con-mein")  datos = datos.filter(c => c.estadoGeneral === "completo");
  if (adminFiltro === "error")     datos = datos.filter(c => c.estadoGeneral === "error" || c.estadoGeneral === "parcial-error");

  if (datos.length === 0) {
    listaEl.innerHTML = `<div class="admin-vacio">No hay colegios en esta categoría.</div>`;
    return;
  }

  let html = "";
  datos.forEach((c, idx) => {
    const idxGlobal = adminDatos.indexOf(c);
    let rowClass = "";
    let badge    = "";
    let acciones = "";
    let detalle  = "";

    if (c.estadoGeneral === "completo") {
      rowClass = "con-mein";
      badge    = `<span class="hoja-badge badge-realizada">✓ ${c.creadas}/${c.total} MEINs creadas</span>`;
      acciones = `<button class="btn-sm btn-sm-danger" onclick="cancelarMeinIdx(${idxGlobal})">↺ Re-encolar</button>`;

    } else if (c.estadoGeneral === "parcial") {
      rowClass = "encolada";
      badge    = `<span class="hoja-badge badge-parcial">⚠ ${c.creadas}/${c.total} MEINs creadas</span>`;
      acciones = `<button class="btn-sm btn-sm-warning" onclick="encolarColegioIdx(${idxGlobal})">+ Completar MEINs</button>`;

    } else if (c.estadoGeneral === "parcial-error") {
      rowClass = "error-mein";
      badge    = `<span class="hoja-badge badge-error-mein">✗ ${c.creadas}/${c.total} — ${c.errores.length} error(es)</span>`;
      acciones = `
        <button class="btn-sm btn-sm-warning" onclick="encolarColegioIdx(${idxGlobal})">↺ Reintentar errores</button>
        <button class="btn-sm btn-sm-danger"  onclick="cancelarMeinIdx(${idxGlobal})">✕ Limpiar</button>`;
      detalle = c.errores.map(e =>
        `<div class="admin-error-detalle">✗ Orden ${esc(e.orden)} — ${esc(e.tipo)}: ${esc(e.msg || "error desconocido")}</div>`
      ).join("");

    } else if (c.estadoGeneral === "error") {
      rowClass = "error-mein";
      badge    = `<span class="hoja-badge badge-error-mein">✗ ${c.errores.length} error(es)</span>`;
      acciones = `
        <button class="btn-sm btn-sm-warning" onclick="encolarColegioIdx(${idxGlobal})">↺ Reintentar</button>
        <button class="btn-sm btn-sm-danger"  onclick="cancelarMeinIdx(${idxGlobal})">✕ Limpiar</button>`;
      detalle = c.errores.map(e =>
        `<div class="admin-error-detalle">✗ Orden ${esc(e.orden)} — ${esc(e.tipo)}: ${esc(e.msg || "error desconocido")}</div>`
      ).join("");

    } else if (c.estadoGeneral === "encolada") {
      rowClass = "encolada";
      badge    = `<span class="hoja-badge badge-pendiente-mein">⏳ ${c.enCola}/${c.total} en cola</span>`;
      acciones = `<button class="btn-sm btn-sm-danger" onclick="cancelarMeinIdx(${idxGlobal})">✕ Cancelar</button>`;

    } else {
      rowClass = "sin-mein";
      badge    = `<span class="hoja-badge badge-pendiente-mein">⚠ Sin MEIN (${c.total} órdenes)</span>`;
      acciones = `<button class="btn-sm btn-sm-warning" onclick="encolarColegioIdx(${idxGlobal})">+ Encolar MEIN</button>`;
    }

    html += `
      <div class="admin-colegio-row ${rowClass}">
        <div class="admin-col-info">
          <div class="admin-col-nombre">📍 ${esc(c.domicilio)}</div>
          <div class="admin-col-detalle">Órdenes: ${c.ordenes.join(", ")}</div>
          ${detalle}
        </div>
        <div class="admin-col-acciones">
          ${badge}
          ${acciones}
        </div>
      </div>`;
  });

  listaEl.innerHTML = html;
}

async function encolarColegioIdx(idx) {
  const c = adminDatos[idx];
  if (!c) return;
  await encolarColegio(c.domicilio, c.ordenes);
}

async function cancelarMeinIdx(idx) {
  const c = adminDatos[idx];
  if (!c) return;
  await cancelarMein(c.domicilio, c.ordenes[0]);
}

async function encolarColegio(domicilio, ordenes) {
  const colegio = adminDatos.find(c => c.domicilio === domicilio);
  if (!colegio) return;

  // Cancelar cualquier pendiente/error anterior para este colegio
  await cancelarMeinSilencioso(ordenes);

  try {
    // Traer el tipo real de cada orden desde colegios_hojas
    const dataOrdenes = await sbGet("colegios_hojas", {
      select: "orden,texto_breve",
      orden:  `in.(${ordenes.join(",")})`,
      mes:    `eq.${adminMes}`
    });

    // Mapear orden -> tipo
    const tipoMap = {};
    dataOrdenes.forEach(r => { tipoMap[String(r.orden)] = r.texto_breve || "MEIN"; });

    const filas = ordenes.map(o => ({
      orden:     o,
      domicilio: domicilio,
      tipo:      tipoMap[String(o)] || "MEIN",
      mes:       adminMes,
      estado:    "pendiente"
    }));

    await sbPost("meins_pendientes", filas);
    showToast(`✓ ${domicilio} encolada (${filas.length} órdenes)`, "ok");
    await cargarAdmin();
  } catch (e) {
    showToast("Error al encolar: " + e.message, "err");
  }
}

async function cancelarMein(domicilio, orden) {
  const ok1 = await confirmarModal(`¿Cancelar y limpiar la cola de MEINs para <strong>${esc(domicilio)}</strong>?`, "🗑️");
  if (!ok1) return;
  const colegio = adminDatos.find(c => c.domicilio === domicilio);
  const ordenes = colegio ? colegio.ordenes : [orden];
  await cancelarMeinSilencioso(ordenes);
  showToast("Cola limpiada", "ok");
  await cargarAdmin();
}

async function cancelarMeinSilencioso(ordenes) {
  for (const o of ordenes) {
    try {
      await sbDelete("meins_pendientes", {
        orden: `eq.${o}`,
        mes:   `eq.${adminMes}`,
        estado: `in.(pendiente,error,creada)`
      });
    } catch (_) { /* silencioso intencional */ }
  }
}

async function encolarTodos() {
  const sinMein = adminDatos.filter(c => !c.tieneMein && !c.estadoCola);
  if (sinMein.length === 0) {
    showToast("No hay colegios sin MEIN para encolar", "");
    return;
  }
  const ok2 = await confirmarModal(`¿Encolar <strong>${sinMein.length} colegio(s)</strong> sin MEIN en ${adminMes} ${ANIO}?`, "⚡");
  if (!ok2) return;

  try {
    // Traer tipos reales de todas las órdenes de una sola vez
    const todasOrdenes = sinMein.flatMap(c => c.ordenes);
    const dataOrdenes = await sbGet("colegios_hojas", {
      select: "orden,texto_breve,domicilio",
      orden:  `in.(${todasOrdenes.join(",")})`,
      mes:    `eq.${adminMes}`
    });

    const tipoMap = {};
    dataOrdenes.forEach(r => { tipoMap[String(r.orden)] = r.texto_breve || "MEIN"; });

    let filas = [];
    sinMein.forEach(c => {
      c.ordenes.forEach(o => {
        filas.push({
          orden:     o,
          domicilio: c.domicilio,
          tipo:      tipoMap[String(o)] || "MEIN",
          mes:       adminMes,
          estado:    "pendiente"
        });
      });
    });

    // Insertar en batches de 50
    for (let i = 0; i < filas.length; i += 50) {
      await sbPost("meins_pendientes", filas.slice(i, i + 50));
    }
    showToast(`✓ ${sinMein.length} colegio(s) encolados (${filas.length} órdenes)`, "ok");
    await cargarAdmin();
  } catch (e) {
    showToast("Error: " + e.message, "err");
  }
}

async function exportarReporte() {
  const btn = document.getElementById("btn-exportar");
  if (btn) { btn.disabled = true; btn.textContent = "⏳ Generando..."; }

  try {
    // Traer todos los datos necesarios
    const [dataColegios, dataMeins, dataRespuestas] = await Promise.all([
      sbGet("colegios_hojas", { select: "domicilio,orden,orden_principal,texto_breve", mes: `eq.${adminMes}` }),
      sbGet("meins_pendientes", { select: "orden,mein_creada,estado,error_msg", mes: `eq.${adminMes}` }),
      sbGet("respuestas", { select: "domicilio,tipo,orden_ref,operario,created_at", mes: `eq.${adminMes}` })
    ]);

    // Construir mapa de MEINs
    const meinMap = {};
    dataMeins.forEach(m => {
      if (!meinMap[m.orden]) meinMap[m.orden] = m;
    });

    // Construir mapa de respuestas por domicilio+tipo
    const respMap = {};
    dataRespuestas.forEach(r => {
      const key = `${r.domicilio}||${r.tipo}`;
      if (!respMap[key]) respMap[key] = [];
      respMap[key].push(r);
    });

    // Construir filas agrupando por domicilio + orden principal
    const colegiosMap = {};
    for (const r of dataColegios) {
      const ppal = r.orden_principal && r.orden_principal !== r.orden ? r.orden_principal : r.orden;
      const key  = `${r.domicilio}||${ppal}`;
      if (!colegiosMap[key]) {
        colegiosMap[key] = {
          domicilio: r.domicilio,
          ordenPpal: ppal,
          tipo: r.texto_breve,
          ordenes: new Set()
        };
      }
      colegiosMap[key].ordenes.add(r.orden);
    }

    // Construir filas del reporte
    const filas = Object.values(colegiosMap).map(col => {
      const mein      = meinMap[col.ordenPpal];
      const meinNum   = mein?.mein_creada || "—";
      const estadoMein = mein?.estado === "creada" ? "Creada" :
                         mein?.estado === "error"  ? "Error" :
                         mein?.estado === "pendiente" ? "En cola" : "Sin MEIN";

      const respKey   = `${col.domicilio}||${col.tipo}`;
      const resps     = respMap[respKey] || [];
      const respondida = resps.length > 0 ? "Sí" : "No";
      const operario  = resps.length > 0 ? resps[0].operario : "—";
      const fecha     = resps.length > 0
        ? new Date(resps[0].created_at).toLocaleString("es-AR", { timeZone: "America/Argentina/Buenos_Aires" })
        : "—";

      return {
        "Domicilio":        col.domicilio,
        "Tipo de tarea":    col.tipo || "—",
        "N° Orden":         col.ordenPpal,
        "MEIN":             meinNum,
        "Estado MEIN":      estadoMein,
        "Respondida":       respondida,
        "Operario":         operario,
        "Fecha de envío":   fecha,
        "Mes":              adminMes,
      };
    }).sort((a, b) => a["Domicilio"].localeCompare(b["Domicilio"]));

    // Generar CSV (compatible con Excel)
    const cols = ["Domicilio","Tipo de tarea","N° Orden","MEIN","Estado MEIN","Respondida","Operario","Fecha de envío","Mes"];
    const bom  = "﻿"; // BOM para que Excel reconozca UTF-8
    const sep  = ";";      // punto y coma — estándar en Excel español

    const header = cols.join(sep);
    const rows   = filas.map(f =>
      cols.map(col => {
        const val = String(f[col] || "").replace(/"/g, '""');
        return val.includes(sep) || val.includes("\n") ? `"${val}"` : val;
      }).join(sep)
    );

    const csv = bom + header + "\n" + rows.join("\n");

    // Descargar
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `MEPL_${adminMes}_${ANIO}_reporte.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    showToast(`✓ Reporte exportado — ${filas.length} colegios`, "ok");

  } catch (e) {
    showToast("Error al exportar: " + e.message, "err");
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = "📥 Exportar Excel"; }
  }
}

async function renderColegiosPorTipo() {
  const app = document.getElementById("app");
  app.innerHTML += `<div class="card">
    <h2>${esc(estado.tipoSeleccionado)}</h2>
    <div id="contenido-colegios-tipo" class="loading">Cargando colegios...</div>
  </div>`;

  try {
    const data = await sbGet("colegios_hojas", {
      select: "domicilio,orden,orden_principal,fecha_fin",
      texto_breve: `eq.${estado.tipoSeleccionado}`,
      mes: `eq.${estado.mes}`
    });

    const colegios = {};
    for (const r of data) {
      const dom  = r.domicilio;
      const ppal = r.orden_principal && r.orden_principal !== r.orden ? r.orden_principal : r.orden;
      if (!colegios[dom]) colegios[dom] = { domicilio: dom, ordenPpal: ppal, fechaFin: r.fecha_fin, ordenes: [] };
      if (!colegios[dom].ordenes.includes(r.orden)) colegios[dom].ordenes.push(r.orden);
    }

    const ordenesAll = Object.values(colegios).map(c => c.ordenPpal);
    let respondidas = new Set();
    if (ordenesAll.length > 0) {
      const respData = await sbGet("respuestas", {
        select: "orden_ref",
        orden_ref: `in.(${ordenesAll.join(",")})`
      });
      respData.forEach(r => respondidas.add(String(r.orden_ref)));
    }

    const todasOrdenes = Object.values(colegios).flatMap(c => c.ordenes);
    let conteoClaves = {};
    if (todasOrdenes.length > 0) {
      const dataClaves = await sbGet("claves_tareas", {
        select: "orden",
        orden: `in.(${todasOrdenes.join(",")})`
      });
      const ordenAPpal = {};
      Object.values(colegios).forEach(c => {
        c.ordenes.forEach(o => { ordenAPpal[String(o)] = String(c.ordenPpal); });
      });
      dataClaves.forEach(r => {
        const ppal = ordenAPpal[String(r.orden)] || String(r.orden);
        conteoClaves[ppal] = (conteoClaves[ppal] || 0) + 1;
      });
    }

    const lista = Object.values(colegios).map(c => ({
      ...c,
      cantTareas: conteoClaves[String(c.ordenPpal)] || c.ordenes.length,
      realizada: respondidas.has(String(c.ordenPpal))
    })).sort((a, b) => a.domicilio.localeCompare(b.domicilio));

    if (lista.length === 0) {
      setContenido("contenido-colegios-tipo", `<div class="error-msg">No hay colegios con este tipo de tarea.</div>`);
      return;
    }

    let html = `<p style="font-size:0.85rem;color:#666;margin-bottom:14px;">
      ${lista.filter(c => !c.realizada).length} pendiente(s) · ${lista.filter(c => c.realizada).length} realizada(s)</p>`;

    lista.forEach(c => {
      if (c.realizada) {
        html += `<div class="colegio-tipo-item realizada">
          <div><div class="hoja-tipo">📍 ${esc(c.domicilio)}</div>
          <div class="hoja-info">Orden: ${esc(c.ordenPpal)}${c.fechaFin ? ' · Vence: '+esc(c.fechaFin):''}</div></div>
          <div class="hoja-badge badge-realizada">✓ Realizada</div></div>`;
      } else {
        html += `<div class="colegio-tipo-item" onclick="seleccionarColegioTipo(${JSON.stringify(c).replace(/"/g,'&quot;')})">
          <div><div class="hoja-tipo">📍 ${esc(c.domicilio)}</div>
          <div class="hoja-info">Orden: ${esc(c.ordenPpal)}${c.fechaFin ? ' · Vence: '+esc(c.fechaFin):''}</div></div>
          <div class="hoja-badge">${c.cantTareas} tarea${c.cantTareas !== 1 ? 's':''}</div></div>`;
      }
    });

    html += `<br><button class="btn btn-back" onclick="volver()">← Cambiar tipo</button>`;
    setContenido("contenido-colegios-tipo", html);
  } catch (e) {
    setContenido("contenido-colegios-tipo", `<div class="error-msg">Error: ${e.message}</div>`);
  }
}
