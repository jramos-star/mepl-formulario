<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEPL — Formulario de Respuestas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #1a3a5c;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header h1 { font-size: 1.2rem; font-weight: 600; }
    header span { font-size: 0.85rem; opacity: 0.75; }
    .btn-inicio {
      margin-left: auto;
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-inicio:hover { background: rgba(255,255,255,0.25); }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px 24px; }

    @media (max-width: 500px) {
      .container { padding: 12px 10px; }
      .card { padding: 16px 14px; margin-bottom: 12px; }
      .colegio-card { padding: 16px 14px; gap: 4px; }
      .colegio-icono { font-size: 1.8rem; }
      .colegio-nombre { font-size: 0.95rem; }
      .hoja-item { padding: 12px 14px; }
      .hoja-tipo { font-size: 0.9rem; }
      .modo-card { padding: 20px 14px; }
      .paso-indicator { margin-bottom: 16px; }
      .paso { font-size: 0.7rem; padding: 4px 2px; }
      header { padding: 12px 14px; }
      header h1 { font-size: 1rem; }
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 1rem;
      color: #1a3a5c;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e8edf2;
    }

    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; }

    select, input[type="text"], textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 0.95rem;
      background: #fafbfc;
      transition: border-color 0.2s;
    }

    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: #1a3a5c;
      background: white;
    }

    textarea { resize: vertical; min-height: 80px; }

    .btn {
      display: inline-block;
      padding: 10px 22px;
      border-radius: 6px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-primary { background: #1a3a5c; color: white; }
    .btn-primary:hover { background: #25527f; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-success { background: #1a7a4a; color: white; }
    .btn-success:hover { background: #22a060; }
    .btn-success:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-back { background: #e8edf2; color: #444; margin-right: 8px; }
    .btn-back:hover { background: #d0d7de; }
    .btn-warning { background: #e8a020; color: #1a1a1a; }
    .btn-warning:hover { background: #d4901a; }
    .btn-warning:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { background: #c0392b; color: white; }
    .btn-danger:hover { background: #a93226; }

    .hoja-item {
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .hoja-item:hover { border-color: #1a3a5c; background: #f0f5ff; }

    .hoja-item.realizada {
      background: #f5f5f5;
      cursor: not-allowed;
      opacity: 0.72;
    }
    .hoja-item.realizada:hover {
      border-color: #d0d7de;
      background: #f5f5f5;
    }
    .hoja-item.realizada .hoja-tipo { color: #888; }

    .hoja-tipo { font-weight: 600; font-size: 0.95rem; color: #1a3a5c; }
    .hoja-info { font-size: 0.8rem; color: #888; margin-top: 3px; }

    .hoja-badge {
      background: #e8edf2;
      color: #555;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.78rem;
      white-space: nowrap;
    }
    .badge-realizada { background: #d4edda; color: #1a7a4a; font-weight: 600; }
    .badge-pendiente-mein { background: #fff3cd; color: #856404; font-weight: 600; }

    .tarea-card {
      border: 1px solid #d0d7de;
      border-radius: 8px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .tarea-header {
      background: #1a3a5c;
      color: white;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .tarea-header .clave { font-weight: 700; font-size: 0.9rem; }
    .tarea-header .texto { font-size: 0.82rem; opacity: 0.85; }

    .tarea-rutina {
      background: #f8f9fa;
      padding: 12px 16px;
      font-size: 0.8rem;
      color: #555;
      line-height: 1.5;
      border-bottom: 1px solid #e8edf2;
    }

    .tarea-respuesta { padding: 12px 16px; }
    .tarea-respuesta label { font-weight: 600; color: #333; margin-bottom: 8px; }

    .respuesta-opciones {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .opcion-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #d0d7de;
      background: white;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .opcion-btn:hover { border-color: #1a3a5c; background: #f0f5ff; }
    .opcion-btn.selected { background: #1a3a5c; color: white; border-color: #1a3a5c; }
    .opcion-btn.selected-na { background: #888; color: white; border-color: #888; }
    .opcion-btn.selected-informe { background: #1a6a8a; color: white; border-color: #1a6a8a; }

    .colegios-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }
    @media (max-width: 500px) { .colegios-grid { grid-template-columns: 1fr; } }

    .colegio-card {
      background: white;
      border: 2px solid #e8edf2;
      border-radius: 12px;
      padding: 16px 14px;
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      overflow: hidden;
    }
    .colegio-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
      background: #1a3a5c;
      border-radius: 2px 0 0 2px;
      opacity: 0;
      transition: opacity 0.18s;
    }
    .colegio-card:hover {
      border-color: #1a3a5c;
      background: #f0f5ff;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(26,58,92,0.13);
    }
    .colegio-card:hover::before { opacity: 1; }
    .colegio-card:active { transform: translateY(0); }

    .colegio-icono { font-size: 1.4rem; margin-bottom: 2px; }
    .colegio-nombre { font-weight: 700; font-size: 0.88rem; color: #1a3a5c; line-height: 1.3; }
    .colegio-flecha {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      color: #c0ccd8;
      font-size: 1.1rem;
      transition: color 0.18s, right 0.18s;
    }
    .colegio-card:hover .colegio-flecha { color: #1a3a5c; right: 9px; }

    .buscar-colegio-wrap { position: relative; margin-bottom: 16px; }
    .buscar-colegio-wrap input { padding-left: 36px; font-size: 0.92rem; }
    .buscar-icon {
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 1rem;
      pointer-events: none;
    }

    .modo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 8px;
    }
    @media (max-width: 500px) { .modo-grid { grid-template-columns: 1fr; } }

    .modo-card {
      background: white;
      border: 2px solid #e8edf2;
      border-radius: 14px;
      padding: 28px 20px;
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }
    .modo-card:hover {
      border-color: #1a3a5c;
      background: #f0f5ff;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(26,58,92,0.13);
    }
    .modo-icono { font-size: 2.4rem; }
    .modo-titulo { font-weight: 700; font-size: 1rem; color: #1a3a5c; }
    .modo-desc { font-size: 0.8rem; color: #888; line-height: 1.4; }

    .tipos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }
    @media (max-width: 600px) { .tipos-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 400px) { .tipos-grid { grid-template-columns: 1fr; } }

    .tipo-card {
      background: white;
      border: 2px solid #e8edf2;
      border-radius: 10px;
      padding: 14px 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 600;
      color: #1a3a5c;
    }
    .tipo-card:hover {
      border-color: #1a3a5c;
      background: #f0f5ff;
      transform: translateY(-1px);
    }
    .tipo-card .tipo-icono { font-size: 1.3rem; display: block; margin-bottom: 4px; }

    .colegio-tipo-item {
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .colegio-tipo-item:hover { border-color: #1a3a5c; background: #f0f5ff; }
    .colegio-tipo-item.realizada {
      opacity: 0.65;
      cursor: not-allowed;
      background: #f5f5f5;
    }
    .colegio-tipo-item.realizada:hover { border-color: #d0d7de; background: #f5f5f5; }

    .mes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 8px;
    }
    .mes-card {
      background: white;
      border: 2px solid #e8edf2;
      border-radius: 12px;
      padding: 18px 14px;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
    }
    .mes-card:hover {
      border-color: #1a3a5c;
      background: #f0f5ff;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(26,58,92,0.12);
    }
    .mes-card.activo { border-color: #1a7a4a; background: #f0fff4; }
    .mes-nombre { font-weight: 700; font-size: 1rem; color: #1a3a5c; }
    .mes-anio { font-size: 0.8rem; color: #888; margin-top: 2px; }
    .mes-icono { font-size: 1.6rem; margin-bottom: 6px; }

    .loading { text-align: center; padding: 40px; color: #888; font-size: 0.9rem; }
    .loading::before { content: "⏳ "; }

    .error-msg {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      border-radius: 6px;
      padding: 12px 16px;
      color: #c00;
      font-size: 0.88rem;
      margin-bottom: 16px;
    }

    .success-msg {
      background: #f0fff4;
      border: 1px solid #b7ebc8;
      border-radius: 6px;
      padding: 20px;
      color: #1a7a4a;
      font-size: 0.95rem;
      text-align: center;
    }
    .success-msg h3 { font-size: 1.2rem; margin-bottom: 8px; }

    .paso-indicator { display: flex; margin-bottom: 24px; }
    .paso {
      flex: 1;
      text-align: center;
      font-size: 0.75rem;
      color: #aaa;
      padding: 6px;
      border-bottom: 2px solid #e8edf2;
    }
    .paso.activo { color: #1a3a5c; border-bottom-color: #1a3a5c; font-weight: 600; }
    .paso.completo { color: #1a7a4a; border-bottom-color: #1a7a4a; }

    .firmante { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .firmante { grid-template-columns: 1fr; } }

    .contador { font-size: 0.78rem; color: #888; float: right; }

    /* ── ADMIN ── */
    .admin-bar {
      background: #2d1a5c;
      color: white;
      padding: 8px 20px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .admin-bar span { opacity: 0.7; }
    .admin-bar strong { color: #e8a020; }

    .admin-colegio-row {
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .admin-colegio-row.sin-mein { border-color: #e8a020; background: #fffbf0; }
    .admin-colegio-row.con-mein { border-color: #b7ebc8; background: #f0fff4; }
    .admin-colegio-row.encolada { border-color: #b8d4f8; background: #f0f5ff; }
    .admin-colegio-row.error-mein { border-color: #ffcccc; background: #fff0f0; }

    .admin-col-info { flex: 1; min-width: 200px; }
    .admin-col-nombre { font-weight: 700; font-size: 0.9rem; color: #1a3a5c; }
    .admin-col-detalle { font-size: 0.78rem; color: #888; margin-top: 3px; }
    .admin-col-acciones { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .btn-sm {
      padding: 5px 12px;
      border-radius: 5px;
      border: none;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-sm:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-sm-warning { background: #e8a020; color: #1a1a1a; }
    .btn-sm-warning:hover:not(:disabled) { background: #d4901a; }
    .btn-sm-success { background: #1a7a4a; color: white; }
    .btn-sm-success:hover:not(:disabled) { background: #22a060; }
    .btn-sm-danger  { background: #c0392b; color: white; }
    .btn-sm-danger:hover:not(:disabled)  { background: #a93226; }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .admin-stat-card {
      background: white;
      border-radius: 8px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .admin-stat-num { font-size: 1.8rem; font-weight: 700; color: #1a3a5c; }
    .admin-stat-label { font-size: 0.75rem; color: #888; margin-top: 4px; }

    .admin-filtros {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: center;
    }
    .filtro-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid #d0d7de;
      background: white;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filtro-btn.activo { background: #1a3a5c; color: white; border-color: #1a3a5c; }
    .filtro-btn:hover:not(.activo) { border-color: #1a3a5c; background: #f0f5ff; }

    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: #1a3a5c;
      color: white;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 0.88rem;
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      z-index: 9999;
      transition: opacity 0.4s;
    }
    .toast.ok  { background: #1a7a4a; }
    .toast.err { background: #c0392b; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>MEPL — Formulario de Respuestas</h1>
    <span>Indaltec SA</span>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
    <span id="header-mes" style="background:#e8a020;color:#1a1a1a;border-radius:20px;padding:4px 14px;font-size:0.82rem;font-weight:700;display:none;"></span>
    <button class="btn-inicio" onclick="volver()" id="btn-volver" style="display:none;">← Volver</button>
    <button class="btn-inicio" onclick="irInicio()" id="btn-inicio" style="display:none;">⌂ Inicio</button>
  </div>
</header>

<!-- Barra admin solo visible con ?admin=true -->
<div class="admin-bar" id="admin-bar" style="display:none;">
  <strong>⚙ MODO ADMIN</strong>
  <span>|</span>
  <span>Panel de creación de MEINs</span>
  <button class="btn-sm btn-sm-warning" style="margin-left:auto;" onclick="irAdmin()">Abrir panel MEINs</button>
</div>

<div class="container">
  <div id="app"></div>
</div>

<!-- Toast -->
<div id="toast" style="display:none;" class="toast"></div>

<script>
const SUPABASE_URL = "https://zynvptlesftdpyijxvpv.supabase.co";
const SUPABASE_KEY = "sb_publishable_a5BtY5K2O8w2rPBlIeKRUg_u6z478MX";

// ── detectar modo admin ──────────────────────────────────────
const IS_ADMIN = new URLSearchParams(window.location.search).get("admin") === "true";
if (IS_ADMIN) document.getElementById("admin-bar").style.display = "flex";

// ── helpers Supabase ─────────────────────────────────────────
async function sbGet(tabla, params = {}) {
  const url = new URL(`${SUPABASE_URL}/rest/v1/${tabla}`);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), {
    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error("Error al leer datos: " + res.status);
  return res.json();
}

async function sbPost(tabla, body, preferHeader = "return=minimal") {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Prefer": preferHeader
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(await res.text());
  return preferHeader.includes("representation") ? res.json() : { ok: true };
}

async function sbPatch(tabla, params, body) {
  const url = new URL(`${SUPABASE_URL}/rest/v1/${tabla}`);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Prefer": "return=minimal"
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(await res.text());
  return { ok: true };
}

async function sbDelete(tabla, params) {
  const url = new URL(`${SUPABASE_URL}/rest/v1/${tabla}`);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), {
    method: "DELETE",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`
    }
  });
  if (!res.ok) throw new Error(await res.text());
  return { ok: true };
}

function showToast(msg, tipo = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast " + tipo;
  t.style.display = "block";
  t.style.opacity = "1";
  setTimeout(() => {
    t.style.opacity = "0";
    setTimeout(() => { t.style.display = "none"; }, 400);
  }, 3000);
}

// ── datos ────────────────────────────────────────────────────
async function getColegios() {
  const data = await sbGet("colegios_hojas", { select: "domicilio", mes: `eq.${estado.mes}` });
  const colegios = [...new Set(data.map(r => r.domicilio).filter(Boolean))].sort();
  return { ok: true, colegios };
}

async function getHojas(domicilio) {
  const data = await sbGet("colegios_hojas", {
    select: "orden,orden_principal,texto_breve,fecha_fin",
    domicilio: `eq.${domicilio}`,
    mes: `eq.${estado.mes}`
  });

  const hojas = {};
  for (const r of data) {
    const key = r.orden_principal && r.orden_principal !== r.orden
                  ? r.orden_principal : r.orden;
    if (!hojas[key]) {
      hojas[key] = { ordenPpal: key, tipo: r.texto_breve, fechaFin: r.fecha_fin, ordenes: [] };
    }
    if (!hojas[key].ordenes.includes(r.orden)) hojas[key].ordenes.push(r.orden);
  }

  let ordenesRespondidas = new Set();
  const respData = await sbGet("respuestas", {
    select: "orden_ref",
    domicilio: `eq.${domicilio}`
  });
  respData.forEach(r => ordenesRespondidas.add(String(r.orden_ref)));

  const todasOrdenes = Object.values(hojas).flatMap(h => h.ordenes);
  let conteoClaves = {};
  if (todasOrdenes.length > 0) {
    const dataClaves = await sbGet("claves_tareas", {
      select: "orden",
      orden: `in.(${todasOrdenes.join(",")})`,
      mes: `eq.${estado.mes}`
    });
    const ordenAPpal = {};
    Object.values(hojas).forEach(h => {
      h.ordenes.forEach(o => { ordenAPpal[String(o)] = String(h.ordenPpal); });
    });
    dataClaves.forEach(r => {
      const ppal = ordenAPpal[String(r.orden)] || String(r.orden);
      conteoClaves[ppal] = (conteoClaves[ppal] || 0) + 1;
    });
  }

  const lista = Object.values(hojas).map(h => ({
    ordenPpal:  h.ordenPpal,
    tipo:       h.tipo,
    fechaFin:   h.fechaFin,
    cantTareas: conteoClaves[String(h.ordenPpal)] || h.ordenes.length,
    ordenes:    h.ordenes,
    realizada:  ordenesRespondidas.has(String(h.ordenPpal))
  }));

  return { ok: true, hojas: lista };
}

async function getTareas(ordenPpal, ordenesYaCalculadas) {
  let ordenes = ordenesYaCalculadas && ordenesYaCalculadas.length > 0
                  ? ordenesYaCalculadas : null;
  let fechaInicio = "";
  let fechaFin    = "";

  if (!ordenes) {
    const dataHojas = await sbGet("colegios_hojas", {
      select: "orden,fecha_inicio,fecha_fin",
      orden_principal: `eq.${ordenPpal}`
    });
    ordenes     = dataHojas.map(r => r.orden);
    fechaInicio = dataHojas[0]?.fecha_inicio || "";
    fechaFin    = dataHojas[0]?.fecha_fin    || "";
    if (ordenes.length === 0) ordenes = [ordenPpal];
  } else {
    const dataFechas = await sbGet("colegios_hojas", {
      select: "fecha_inicio,fecha_fin",
      orden: `eq.${ordenesYaCalculadas[0]}`
    });
    fechaInicio = dataFechas[0]?.fecha_inicio || "";
    fechaFin    = dataFechas[0]?.fecha_fin    || "";
  }

  const dataClaves = await sbGet("claves_tareas", {
    select: "orden,clave,texto_breve,descripcion,orden_fila",
    orden: `in.(${ordenes.join(",")})`,
    order: "orden_fila.asc"
  });

  const tareas = dataClaves.map(r => ({
    orden: r.orden, clave: r.clave,
    texto: r.texto_breve, descripcion: r.descripcion
  }));

  return { ok: true, tareas, fechaInicio, fechaFin };
}

async function apiPost(body) {
  const filas = body.tareas.map(t => ({
    mein:          t.mein,
    orden_ref:     t.ordenRef,
    domicilio:     t.domicilio,
    tipo:          t.tipo,
    respuesta:     t.respuesta,
    operario:      t.operario,
    jefe:          t.jefe,
    observaciones: t.observaciones || ""
  }));

  const res = await fetch(`${SUPABASE_URL}/rest/v1/respuestas`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Prefer": "return=minimal"
    },
    body: JSON.stringify(filas)
  });

  if (!res.ok) throw new Error("Error al guardar: " + await res.text());
  return { ok: true };
}

let estado = {
  paso: -1, modo: "", tipoSeleccionado: "", mes: "",
  domicilio: "", hojaSeleccionada: null,
  tareas: [], respuestas: {}, operario: "", jefe: "",
  fechaInicio: "", fechaFin: "", observaciones: "",
  vista: "formulario"   // "formulario" | "admin"
};

function render() {
  const app = document.getElementById("app");

  if (estado.vista === "admin") {
    renderAdmin();
    return;
  }

  const btnInicio = document.getElementById("btn-inicio");
  const btnVolver = document.getElementById("btn-volver");
  if (btnInicio) btnInicio.style.display = estado.paso <= -1 ? "none" : "block";
  if (btnVolver) btnVolver.style.display = estado.paso <= 0 ? "none" : "block";

  if (estado.paso === -1) { app.innerHTML = ""; renderSelectorMes(); return; }
  if (estado.paso === 0)  { app.innerHTML = ""; renderModo(); return; }

  const pasos = estado.modo === "tipo"
    ? ["Tipo", "Colegio", "Respuestas", "Confirmación"]
    : ["Colegio", "Hoja", "Respuestas", "Confirmación"];

  let html = `<div class="paso-indicator">`;
  pasos.forEach((p, i) => {
    const cls = i + 1 === estado.paso ? "activo" : i + 1 < estado.paso ? "completo" : "";
    html += `<div class="paso ${cls}">${i + 1}. ${p}</div>`;
  });
  html += `</div>`;
  app.innerHTML = html;

  if (estado.modo === "tipo") {
    if      (estado.paso === 1) renderTipos();
    else if (estado.paso === 2) renderColegiosPorTipo();
    else if (estado.paso === 3) { if (estado.tareas && estado.tareas.length > 0) renderFormularioTareas(); }
    else if (estado.paso === 4) renderConfirmacion();
  } else {
    if      (estado.paso === 1) renderColegios();
    else if (estado.paso === 2) renderHojas();
    else if (estado.paso === 3) { if (estado.tareas && estado.tareas.length > 0) renderFormularioTareas(); }
    else if (estado.paso === 4) renderConfirmacion();
  }
}

let adminMes = "Junio";
let adminFiltro = "todos";
let adminDatos = [];

async function cargarAdmin() {
  const listaEl   = document.getElementById("admin-lista");
  const statsEl   = document.getElementById("admin-stats");
  const filtrosEl = document.getElementById("admin-filtros");
  if (!listaEl) return;
  listaEl.innerHTML = `<div class="loading">Cargando...</div>`;

  try {
    // 1. Traer todos los colegios del mes
    const dataColegios = await sbGet("colegios_hojas", {
      select: "domicilio,orden,orden_principal,texto_breve",
      mes: `eq.${adminMes}`
    });

    // Agrupar por domicilio → lista de órdenes principales únicas
    const colegiosMap = {};
    for (const r of dataColegios) {
      const dom  = r.domicilio;
      const ppal = r.orden_principal && r.orden_principal !== r.orden
                    ? r.orden_principal : r.orden;
      if (!colegiosMap[dom]) colegiosMap[dom] = { domicilio: dom, ordenes: new Set() };
      colegiosMap[dom].ordenes.add(ppal);
    }

    // 2. Traer MEINs ya existentes en colegios_hojas
    //    Una MEIN existe si orden != orden_principal (fue creada como sub-orden)
    const meinsExistentes = new Set();
    dataColegios.forEach(r => {
      if (r.orden_principal && r.orden_principal !== r.orden) {
        meinsExistentes.add(String(r.orden_principal));
      }
    });

    // 3. Traer pendientes en meins_pendientes
    const pendientesData = await sbGet("meins_pendientes", {
      select: "*",
      mes: `eq.${adminMes}`
    });
    const pendientesMap = {};
    pendientesData.forEach(p => {
      if (!pendientesMap[p.orden]) pendientesMap[p.orden] = [];
      pendientesMap[p.orden].push(p);
    });

    // 4. Construir lista de colegios con estado
    adminDatos = Object.values(colegiosMap).map(c => {
      const ordenesList = [...c.ordenes];
      // Revisar si alguna orden principal ya tiene MEIN
      const tieneMein = ordenesList.some(o => meinsExistentes.has(String(o)));

      // Estado de la cola
      let estadoCola = null;
      let colaDatos  = null;
      for (const o of ordenesList) {
        if (pendientesMap[o] && pendientesMap[o].length > 0) {
          colaDatos  = pendientesMap[o][pendientesMap[o].length - 1];
          estadoCola = colaDatos.estado;
          break;
        }
      }

      return {
        domicilio: c.domicilio,
        ordenes:   ordenesList,
        tieneMein,
        estadoCola,
        colaDatos
      };
    }).sort((a, b) => a.domicilio.localeCompare(b.domicilio));

    // Stats
    const total      = adminDatos.length;
    const conMein    = adminDatos.filter(c => c.tieneMein).length;
    const sinMein    = adminDatos.filter(c => !c.tieneMein && !c.estadoCola).length;
    const encoladas  = adminDatos.filter(c => c.estadoCola === "pendiente" || c.estadoCola === "procesando").length;
    const creadas    = adminDatos.filter(c => c.estadoCola === "creada").length;
    const conError   = adminDatos.filter(c => c.estadoCola === "error").length;

    if (statsEl) statsEl.innerHTML = `
      <div class="admin-stat-card"><div class="admin-stat-num">${total}</div><div class="admin-stat-label">Total colegios</div></div>
      <div class="admin-stat-card"><div class="admin-stat-num" style="color:#1a7a4a">${conMein}</div><div class="admin-stat-label">Con MEIN</div></div>
      <div class="admin-stat-card"><div class="admin-stat-num" style="color:#e8a020">${sinMein}</div><div class="admin-stat-label">Sin MEIN</div></div>
      <div class="admin-stat-card"><div class="admin-stat-num" style="color:#1a3a5c">${encoladas}</div><div class="admin-stat-label">En cola</div></div>
      <div class="admin-stat-card"><div class="admin-stat-num" style="color:#c0392b">${conError}</div><div class="admin-stat-label">Con error</div></div>`;

    if (filtrosEl) filtrosEl.innerHTML = `
      <span style="font-size:0.82rem;color:#666;">Filtrar:</span>
      ${[["todos","Todos"],["sin-mein","Sin MEIN"],["encolada","En cola"],["con-mein","Con MEIN"],["error","Error"]]
        .map(([v,l]) => `<button class="filtro-btn ${adminFiltro===v?"activo":""}" onclick="setFiltroAdmin('${v}')">${l}</button>`).join("")}`;

    renderListaAdmin();

  } catch (e) {
    listaEl.innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
  }
}

function setFiltroAdmin(f) {
  adminFiltro = f;
  document.querySelectorAll(".filtro-btn").forEach(b => {
    b.classList.toggle("activo", b.textContent.toLowerCase().includes(f === "todos" ? "todos" : f));
  });
  renderListaAdmin();
}

function renderListaAdmin() {
  const listaEl = document.getElementById("admin-lista");
  if (!listaEl) return;

  let datos = adminDatos;
  if (adminFiltro === "sin-mein")  datos = datos.filter(c => !c.tieneMein && !c.estadoCola);
  if (adminFiltro === "encolada")  datos = datos.filter(c => c.estadoCola === "pendiente" || c.estadoCola === "procesando");
  if (adminFiltro === "con-mein")  datos = datos.filter(c => c.tieneMein);
  if (adminFiltro === "error")     datos = datos.filter(c => c.estadoCola === "error");

  if (datos.length === 0) {
    listaEl.innerHTML = `<div style="text-align:center;padding:30px;color:#888;">No hay colegios en esta categoría.</div>`;
    return;
  }

  let html = "";
  datos.forEach(c => {
    let rowClass = "";
    let badge    = "";
    let acciones = "";

    if (c.tieneMein) {
      rowClass = "con-mein";
      badge    = `<span class="hoja-badge badge-realizada">✓ MEIN creada</span>`;
      acciones = `<button class="btn-sm btn-sm-danger" onclick="cancelarMein('${esc(c.domicilio)}', '${c.ordenes[0]}')">✕ Quitar de cola</button>`;
    } else if (c.estadoCola === "pendiente") {
      rowClass = "encolada";
      badge    = `<span class="hoja-badge badge-pendiente-mein">⏳ En cola</span>`;
      acciones = `<button class="btn-sm btn-sm-danger" onclick="cancelarMein('${esc(c.domicilio)}', '${c.ordenes[0]}')">✕ Cancelar</button>`;
    } else if (c.estadoCola === "procesando") {
      rowClass = "encolada";
      badge    = `<span class="hoja-badge" style="background:#d0e8ff;color:#1a3a5c;">⚙ Procesando...</span>`;
      acciones = "";
    } else if (c.estadoCola === "creada") {
      rowClass = "con-mein";
      badge    = `<span class="hoja-badge badge-realizada">✓ MEIN: ${esc(c.colaDatos?.mein_creada || "")}</span>`;
      acciones = "";
    } else if (c.estadoCola === "error") {
      rowClass = "error-mein";
      badge    = `<span class="hoja-badge" style="background:#ffcccc;color:#c00;">✗ Error</span>`;
      acciones = `
        <button class="btn-sm btn-sm-warning" onclick="encolarColegio('${esc(c.domicilio)}', ${JSON.stringify(c.ordenes)})">↺ Reintentar</button>
        <button class="btn-sm btn-sm-danger"  onclick="cancelarMein('${esc(c.domicilio)}', '${c.ordenes[0]}')">✕ Limpiar</button>`;
    } else {
      rowClass = "sin-mein";
      badge    = `<span class="hoja-badge badge-pendiente-mein">⚠ Sin MEIN</span>`;
      acciones = `<button class="btn-sm btn-sm-warning" onclick="encolarColegio('${esc(c.domicilio)}', ${JSON.stringify(c.ordenes)})">+ Encolar MEIN</button>`;
    }

    const errorTxt = c.estadoCola === "error" && c.colaDatos?.error_msg
      ? `<div style="color:#c00;font-size:0.74rem;margin-top:3px;">Error: ${esc(c.colaDatos.error_msg)}</div>`
      : "";

    html += `
      <div class="admin-colegio-row ${rowClass}">
        <div class="admin-col-info">
          <div class="admin-col-nombre">📍 ${esc(c.domicilio)}</div>
          <div class="admin-col-detalle">Órdenes: ${c.ordenes.join(", ")}</div>
          ${errorTxt}
        </div>
        <div class="admin-col-acciones">
          ${badge}
          ${acciones}
        </div>
      </div>`;
  });

  listaEl.innerHTML = html;
}

async function encolarColegio(domicilio, ordenes) {
  // Buscar datos completos del colegio en adminDatos
  const colegio = adminDatos.find(c => c.domicilio === domicilio);
  if (!colegio) return;

  // Cancelar cualquier pendiente/error anterior para este colegio
  await cancelarMeinSilencioso(ordenes);

  // Encolar cada orden principal
  try {
    const filas = ordenes.map(o => ({
      orden:     o,
      domicilio: domicilio,
      tipo:      "MEIN",
      mes:       adminMes,
      estado:    "pendiente"
    }));
    await sbPost("meins_pendientes", filas);
    showToast(`✓ ${domicilio} encolada`, "ok");
    await cargarAdmin();
  } catch (e) {
    showToast("Error al encolar: " + e.message, "err");
  }
}

async function cancelarMein(domicilio, orden) {
  if (!confirm(`¿Cancelar/limpiar la cola de MEINs para ${domicilio}?`)) return;
  const colegio = adminDatos.find(c => c.domicilio === domicilio);
  const ordenes = colegio ? colegio.ordenes : [orden];
  await cancelarMeinSilencioso(ordenes);
  showToast("Cola limpiada", "ok");
  await cargarAdmin();
}

async function cancelarMeinSilencioso(ordenes) {
  for (const o of ordenes) {
    try {
      await sbDelete("meins_pendientes", {
        orden: `eq.${o}`,
        mes:   `eq.${adminMes}`,
        estado: `in.(pendiente,error,creada)`
      });
    } catch (_) {}
  }
}

async function encolarTodos() {
  const sinMein = adminDatos.filter(c => !c.tieneMein && !c.estadoCola);
  if (sinMein.length === 0) {
    showToast("No hay colegios sin MEIN para encolar", "");
    return;
  }
  if (!confirm(`¿Encolar ${sinMein.length} colegio(s) sin MEIN en ${adminMes} 2026?`)) return;

  let filas = [];
  sinMein.forEach(c => {
    c.ordenes.forEach(o => {
      filas.push({ orden: o, domicilio: c.domicilio, tipo: "MEIN", mes: adminMes, estado: "pendiente" });
    });
  });

  try {
    // Insertar en batches de 50
    for (let i = 0; i < filas.length; i += 50) {
      await sbPost("meins_pendientes", filas.slice(i, i + 50));
    }
    showToast(`✓ ${sinMein.length} colegio(s) encolados`, "ok");
    await cargarAdmin();
  } catch (e) {
    showToast("Error: " + e.message, "err");
  }
}

async function renderTipos() {
  const app = document.getElementById("app");
  app.innerHTML += `<div class="card">
    <h2>Seleccioná el tipo de tarea</h2>
    <div id="contenido-tipos" class="loading">Cargando tipos...</div>
  </div>`;

  try {
    const data = await sbGet("colegios_hojas", { select: "texto_breve", mes: `eq.${estado.mes}` });
    const tipos = [...new Set(data.map(r => r.texto_breve).filter(Boolean))].sort();

    const iconos = {
      "GAS":"🔥","AGUA":"💧","ELECTRICA":"⚡","ELECTR":"⚡",
      "SANEAMIENTO":"🧹","ESTRUCTURA":"🏗️","MAMPOSTERIA":"🧱",
      "CALEFACCION":"♨️","INCENDIO":"🚒","PLUVIALES":"🌧️",
      "CLOACAL":"🚰","BAJA TENSION":"🔌","MOBILIARIO":"🪑",
      "CUBIERTA":"🏠","PREDIO":"🌳","TERMINACIONES":"🎨",
      "CERRAMIENTO":"🚪","ELEVADORA":"🛗","PLATAFORMA":"🛗"
    };
    function getIcono(tipo) {
      const t = tipo.toUpperCase();
      for (const [k, v] of Object.entries(iconos)) if (t.includes(k)) return v;
      return "📋";
    }

    let html = `<div class="tipos-grid">`;
    tipos.forEach(t => {
      html += `<div class="tipo-card" onclick="seleccionarTipo('${esc(t)}')">
        <span class="tipo-icono">${getIcono(t)}</span>${esc(t)}</div>`;
    });
    html += `</div><br><button class="btn btn-back" onclick="volverModo()">← Cambiar modo</button>`;
    document.getElementById("contenido-tipos").innerHTML = html;
  } catch (e) {
    document.getElementById("contenido-tipos").innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
  }
}

function seleccionarTipo(tipo) {
  estado.tipoSeleccionado = tipo;
  estado.paso = 2;
  render();
}

// ============================================================
// MODO TIPO — Paso 2
// ============================================================
async function renderColegiosPorTipo() {
  const app = document.getElementById("app");
  app.innerHTML += `<div class="card">
    <h2>${esc(estado.tipoSeleccionado)}</h2>
    <div id="contenido-colegios-tipo" class="loading">Cargando colegios...</div>
  </div>`;

  try {
    const data = await sbGet("colegios_hojas", {
      select: "domicilio,orden,orden_principal,fecha_fin",
      texto_breve: `eq.${estado.tipoSeleccionado}`,
      mes: `eq.${estado.mes}`
    });

    const colegios = {};
    for (const r of data) {
      const dom  = r.domicilio;
      const ppal = r.orden_principal && r.orden_principal !== r.orden ? r.orden_principal : r.orden;
      if (!colegios[dom]) colegios[dom] = { domicilio: dom, ordenPpal: ppal, fechaFin: r.fecha_fin, ordenes: [] };
      if (!colegios[dom].ordenes.includes(r.orden)) colegios[dom].ordenes.push(r.orden);
    }

    const ordenesAll = Object.values(colegios).map(c => c.ordenPpal);
    let respondidas = new Set();
    if (ordenesAll.length > 0) {
      const respData = await sbGet("respuestas", {
        select: "orden_ref",
        orden_ref: `in.(${ordenesAll.join(",")})`
      });
      respData.forEach(r => respondidas.add(String(r.orden_ref)));
    }

    const todasOrdenes = Object.values(colegios).flatMap(c => c.ordenes);
    let conteoClaves = {};
    if (todasOrdenes.length > 0) {
      const dataClaves = await sbGet("claves_tareas", {
        select: "orden",
        orden: `in.(${todasOrdenes.join(",")})`
      });
      const ordenAPpal = {};
      Object.values(colegios).forEach(c => {
        c.ordenes.forEach(o => { ordenAPpal[String(o)] = String(c.ordenPpal); });
      });
      dataClaves.forEach(r => {
        const ppal = ordenAPpal[String(r.orden)] || String(r.orden);
        conteoClaves[ppal] = (conteoClaves[ppal] || 0) + 1;
      });
    }

    const lista = Object.values(colegios).map(c => ({
      ...c,
      cantTareas: conteoClaves[String(c.ordenPpal)] || c.ordenes.length,
      realizada: respondidas.has(String(c.ordenPpal))
    })).sort((a, b) => a.domicilio.localeCompare(b.domicilio));

    if (lista.length === 0) {
      document.getElementById("contenido-colegios-tipo").innerHTML =
        `<div class="error-msg">No hay colegios con este tipo de tarea.</div>`;
      return;
    }

    let html = `<p style="font-size:0.85rem;color:#666;margin-bottom:14px;">
      ${lista.filter(c => !c.realizada).length} pendiente(s) · ${lista.filter(c => c.realizada).length} realizada(s)</p>`;

    lista.forEach(c => {
      if (c.realizada) {
        html += `<div class="colegio-tipo-item realizada">
          <div><div class="hoja-tipo">📍 ${esc(c.domicilio)}</div>
          <div class="hoja-info">Orden: ${esc(c.ordenPpal)}${c.fechaFin ? ' · Vence: '+esc(c.fechaFin):''}</div></div>
          <div class="hoja-badge badge-realizada">✓ Realizada</div></div>`;
      } else {
        html += `<div class="colegio-tipo-item" onclick="seleccionarColegioTipo(${JSON.stringify(c).replace(/"/g,'&quot;')})">
          <div><div class="hoja-tipo">📍 ${esc(c.domicilio)}</div>
          <div class="hoja-info">Orden: ${esc(c.ordenPpal)}${c.fechaFin ? ' · Vence: '+esc(c.fechaFin):''}</div></div>
          <div class="hoja-badge">${c.cantTareas} tarea${c.cantTareas !== 1 ? 's':''}</div></div>`;
      }
    });

    html += `<br><button class="btn btn-back" onclick="volver()">← Cambiar tipo</button>`;
    document.getElementById("contenido-colegios-tipo").innerHTML = html;
  } catch (e) {
    document.getElementById("contenido-colegios-tipo").innerHTML =
      `<div class="error-msg">Error: ${e.message}</div>`;
  }
}

async function seleccionarColegioTipo(colegio) {
  estado.domicilio = colegio.domicilio;
  estado.hojaSeleccionada = {
    ordenPpal: colegio.ordenPpal, tipo: estado.tipoSeleccionado,
    fechaFin: colegio.fechaFin, ordenes: colegio.ordenes
  };
  estado.paso = 3;
  render();

  const app = document.getElementById("app");
  app.innerHTML += `<div class="card" id="card-tareas"><div class="loading">Cargando tareas...</div></div>`;
  try {
    const res = await getTareas(colegio.ordenPpal, colegio.ordenes);
    if (!res.ok) throw new Error(res.error);
    estado.tareas = res.tareas; estado.fechaInicio = res.fechaInicio || "";
    estado.fechaFin = res.fechaFin || ""; estado.respuestas = {};
    renderFormularioTareas();
  } catch (e) {
    document.getElementById("card-tareas").innerHTML =
      `<div class="error-msg">Error al cargar tareas: ${e.message}</div>`;
  }
}

function volverModo() { estado.paso = 0; estado.modo = ""; estado.tipoSeleccionado = ""; render(); }

// ============================================================
// MODO COLEGIO — Pasos 1 y 2
// ============================================================
async function renderColegios() {
  const app = document.getElementById("app");
  app.innerHTML += `<div class="card">
    <h2>Seleccioná tu establecimiento</h2>
    <div id="contenido-colegios" class="loading">Cargando colegios...</div>
  </div>`;
  try {
    const res = await getColegios();
    let html = `
      <div class="buscar-colegio-wrap">
        <span class="buscar-icon">🔍</span>
        <input type="text" placeholder="Buscar por dirección..."
          oninput="filtrarColegios(this.value)">
      </div>
      <div class="colegios-grid" id="lista-colegios">`;
    res.colegios.forEach(c => {
      html += `<div class="colegio-card colegio-item"
        onclick="seleccionarColegio(this.dataset.valor)"
        data-valor="${esc(c)}" data-nombre="${c.toLowerCase()}">
        <div class="colegio-icono">🏫</div>
        <div class="colegio-nombre">${esc(c)}</div>
        <span class="colegio-flecha">›</span></div>`;
    });

    document.getElementById("contenido-colegios").innerHTML = html;
  } catch (e) {
    document.getElementById("contenido-colegios").innerHTML =
      `<div class="error-msg">Error al cargar colegios: ${e.message}</div>`;
  }
}

function filtrarColegios(texto) {
  const filtro = texto.toLowerCase();
  document.querySelectorAll(".colegio-item").forEach(el => {
    el.style.display = el.dataset.nombre.includes(filtro) ? "flex" : "none";
  });
}

function seleccionarColegio(domicilio) {
  if (!domicilio) return;
  estado.domicilio = domicilio;
  estado.paso = 2;
  render();
}

async function renderHojas() {
  const app = document.getElementById("app");
  app.innerHTML += `<div class="card"><h2>${esc(estado.domicilio)}</h2>
    <div id="contenido-hojas" class="loading">Cargando hojas...</div></div>`;
  try {
    const res = await getHojas(estado.domicilio);
    if (!res.ok) throw new Error(res.error);

    let html = `<p style="font-size:0.85rem;color:#666;margin-bottom:14px;">
      Seleccioná la hoja que vas a completar:</p>`;

    if (res.hojas.length === 0) {
      html += `<div class="error-msg">No hay hojas disponibles para este colegio.</div>`;
    } else {
      res.hojas.forEach(h => {
        if (h.realizada) {
          html += `<div class="hoja-item realizada">
            <div><div class="hoja-tipo">${esc(h.tipo)}</div>
            <div class="hoja-info">Orden: ${esc(h.ordenPpal)}${h.fechaFin?' · Vence: '+esc(h.fechaFin):''}</div></div>
            <div class="hoja-badge badge-realizada">✓ Realizada</div></div>`;
        } else {
          html += `<div class="hoja-item" onclick="seleccionarHoja(${JSON.stringify(h).replace(/"/g,'&quot;')})">
            <div><div class="hoja-tipo">${esc(h.tipo)}</div>
            <div class="hoja-info">Orden: ${esc(h.ordenPpal)}${h.fechaFin?' · Vence: '+esc(h.fechaFin):''}</div></div>
            <div class="hoja-badge">${h.cantTareas} tarea${h.cantTareas!==1?'s':''}</div></div>`;
        }
      });
    }
    html += `<br><button class="btn btn-back" onclick="volver()">← Cambiar colegio</button>`;
    document.getElementById("contenido-hojas").innerHTML = html;
  } catch (e) {
    document.getElementById("contenido-hojas").innerHTML =
      `<div class="error-msg">Error: ${e.message}</div>`;
  }
}

async function seleccionarHoja(hoja) {
  estado.hojaSeleccionada = hoja;
  estado.paso = 3;
  render();
  const app = document.getElementById("app");
  app.innerHTML += `<div class="card" id="card-tareas"><div class="loading">Cargando tareas...</div></div>`;
  try {
    const res = await getTareas(hoja.ordenPpal, hoja.ordenes);
    if (!res.ok) throw new Error(res.error);
    estado.tareas = res.tareas; estado.fechaInicio = res.fechaInicio || "";
    estado.fechaFin = res.fechaFin || ""; estado.respuestas = {};
    renderFormularioTareas();
  } catch (e) {
    document.getElementById("card-tareas").innerHTML =
      `<div class="error-msg">Error al cargar tareas: ${e.message}</div>`;
  }
}

// ============================================================
// Formulario de tareas
// ============================================================
function renderFormularioTareas() {
  if (!estado.tareas || estado.tareas.length === 0) return;
  let card = document.getElementById("card-tareas");
  if (!card) {
    const div = document.createElement("div");
    div.className = "card"; div.id = "card-tareas";
    document.getElementById("app").appendChild(div);
    card = div;
  }

  const opciones = ["Realizado", "Requiere TOM", "No aplica", "En obra"];
  const tiposConInforme = ["GAS", "AGUA", "ELECTRICA", "ELECTR"];
  const tipoHoja = (estado.hojaSeleccionada.tipo || "").toUpperCase();
  const hojaConInforme = tiposConInforme.some(t => tipoHoja.includes(t));

  let html = `
  <div style="background:#1a3a5c;color:white;border-radius:8px;padding:14px 16px;margin-bottom:16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="font-size:0.75rem;opacity:0.8;">SAP N°</span>
      <span style="font-size:0.75rem;font-weight:700;background:rgba(255,255,255,0.15);padding:2px 10px;border-radius:20px;">MEPL &nbsp;|&nbsp; COMUNA 6</span>
      <span style="font-size:0.75rem;font-weight:700;background:#e8a020;color:#1a1a1a;padding:2px 10px;border-radius:20px;">${(estado.mes||"").toUpperCase()} 2026</span>
    </div>
    <div style="font-size:1.1rem;font-weight:700;margin-bottom:6px;">${esc(estado.hojaSeleccionada.ordenPpal)}</div>
    <div style="font-size:0.85rem;opacity:0.9;margin-bottom:10px;">📍 ${esc(estado.domicilio)}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:0.78rem;border-top:1px solid rgba(255,255,255,0.2);padding-top:10px;">
      <div><span style="opacity:0.7;">Inicio ext.</span><br><strong>${esc(estado.fechaInicio)||"—"}</strong></div>
      <div><span style="opacity:0.7;">Fin ext.</span><br><strong>${esc(estado.fechaFin)||"—"}</strong></div>
    </div>
  </div>
  <div style="font-size:0.95rem;font-weight:700;color:#1a3a5c;margin-bottom:14px;">${esc(estado.hojaSeleccionada.tipo)}</div>`;

  estado.tareas.forEach((t, idx) => {
    const key = `${t.orden}_${t.clave}`;
    const mostrarInforme = hojaConInforme && idx === 0;
    html += `
      <div class="tarea-card">
        <div class="tarea-header">
          <span class="clave">${esc(t.clave)}</span>
          <span class="texto">${esc(t.texto)}</span>
        </div>
        <div class="tarea-rutina">${formatearDescripcion(t.descripcion)}</div>
        <div class="tarea-respuesta">
          <label>Respuesta <span class="contador">${idx+1}/${estado.tareas.length}</span></label>
          <div class="respuesta-opciones">
            ${opciones.map(op => `<button class="opcion-btn" onclick="elegirOpcion('${key}','${op}',this)">${op}</button>`).join("")}
            ${mostrarInforme ? `<button class="opcion-btn" onclick="elegirOpcion('${key}','se adjunta informe de consumo',this)" style="border-color:#1a6a8a;color:#1a6a8a;">📋 Se adjunta informe de consumo</button>` : ""}
          </div>
          <textarea id="txt_${key}" placeholder="Descripción de la tarea realizada (obligatorio)..."
            onchange="actualizarRespuesta('${key}')"></textarea>
        </div>
      </div>`;
  });

  html += `
    <div class="card" style="margin-top:8px;">
      <h2>Observaciones</h2>
      <textarea id="inp-observaciones" placeholder="Observaciones generales (opcional)..." style="min-height:70px;"
        oninput="estado.observaciones=this.value"></textarea>
    </div>
    <div class="card" style="margin-top:8px;">
      <h2>Datos del operario</h2>
      <div class="firmante">
        <div><label>Nombre del operario</label>
          <input type="text" id="inp-operario" placeholder="Nombre y apellido" oninput="estado.operario=this.value"></div>
        <div><label>Jefe de sitio</label>
          <input type="text" id="inp-jefe" placeholder="Nombre y apellido" oninput="estado.jefe=this.value"></div>
      </div>
    </div>
    <div id="error-envio"></div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="btn btn-back" onclick="volver()">← Volver</button>
      <button class="btn btn-success" onclick="enviarRespuestas()">Enviar respuestas ✓</button>
    </div>`;

  card.innerHTML = html;
}

function elegirOpcion(key, opcion, btn) {
  btn.closest(".respuesta-opciones").querySelectorAll(".opcion-btn").forEach(b => {
    b.classList.remove("selected","selected-na","selected-informe");
  });
  const esNA      = opcion === "No aplica" || opcion === "En obra";
  const esInforme = opcion === "se adjunta informe de consumo";
  if (esNA) btn.classList.add("selected-na");
  else if (esInforme) btn.classList.add("selected-informe");
  else btn.classList.add("selected");

  const txt = document.getElementById(`txt_${key}`);
  if (esNA) { txt.value = opcion.toLowerCase(); txt.style.opacity = "0.5"; }
  else if (esInforme) { txt.value = "se adjunta informe de consumo"; txt.style.opacity = "0.6"; }
  else {
    if (["no aplica","en obra","se adjunta informe de consumo"].includes(txt.value)) txt.value = "";
    txt.style.opacity = "1";
  }
  estado.respuestas[key] = { opcion, texto: txt.value };
}

function actualizarRespuesta(key) {
  const txt = document.getElementById(`txt_${key}`).value;
  if (!estado.respuestas[key]) estado.respuestas[key] = { opcion: "", texto: "" };
  estado.respuestas[key].texto = txt;
}

async function enviarRespuestas() {
  const errorDiv = document.getElementById("error-envio");
  errorDiv.innerHTML = "";

  const sinResponder = estado.tareas.filter(t => {
    const key = `${t.orden}_${t.clave}`;
    const r = estado.respuestas[key];
    return !r || (!r.texto && !r.opcion);
  });

  if (sinResponder.length > 0) {
    errorDiv.innerHTML = `<div class="error-msg">Falta completar ${sinResponder.length} tarea(s): ${sinResponder.map(t=>t.clave).join(", ")}</div>`;
    return;
  }
  if (!estado.operario.trim()) {
    errorDiv.innerHTML = `<div class="error-msg">Ingresá el nombre del operario.</div>`;
    return;
  }

  const tareasPorMEIN = {};
  estado.tareas.forEach(t => {
    const key = `${t.orden}_${t.clave}`;
    const r = estado.respuestas[key] || {};
    const respTexto = r.texto || r.opcion || "no aplica";
    if (!tareasPorMEIN[t.orden]) {
      tareasPorMEIN[t.orden] = {
        mein: t.orden, ordenRef: estado.hojaSeleccionada.ordenPpal,
        domicilio: estado.domicilio, tipo: estado.hojaSeleccionada.tipo, respuestas: []
      };
    }
    tareasPorMEIN[t.orden].respuestas.push(respTexto);
  });

  const tareas = Object.values(tareasPorMEIN).map(m => ({
    mein: m.mein, ordenRef: m.ordenRef, domicilio: m.domicilio,
    tipo: m.tipo, respuesta: m.respuestas.join("||"),
    operario: estado.operario, jefe: estado.jefe,
    observaciones: estado.observaciones || ""
  }));

  const btn = document.querySelector(".btn-success");
  btn.disabled = true; btn.textContent = "Enviando...";

  try {
    const res = await apiPost({ tareas });
    if (!res.ok) throw new Error(res.error);
    estado.paso = 4;
    render();
  } catch (e) {
    errorDiv.innerHTML = `<div class="error-msg">Error al enviar: ${e.message}</div>`;
    btn.disabled = false; btn.textContent = "Enviar respuestas ✓";
  }
}

// ============================================================
// Confirmación
// ============================================================
function renderConfirmacion() {
  const app = document.getElementById("app");
  app.innerHTML += `
    <div class="card">
      <div class="success-msg">
        <h3>✅ Respuestas enviadas</h3>
        <p>Las respuestas de <strong>${esc(estado.hojaSeleccionada.tipo)}</strong><br>
        en <strong>${esc(estado.domicilio)}</strong><br>
        fueron guardadas correctamente.</p>
        <br>
        <button class="btn btn-primary" onclick="reiniciar()">Completar otra hoja</button>
      </div>
    </div>`;
}

function reiniciar() {
  if (estado.modo === "tipo") {
    estado.paso = 2; estado.hojaSeleccionada = null;
    estado.tareas = []; estado.respuestas = {};
    estado.operario = ""; estado.jefe = "";
    estado.fechaInicio = ""; estado.fechaFin = "";
  } else {
    const dom = estado.domicilio;
    estado = { paso: 2, modo: "colegio", tipoSeleccionado: "",
               domicilio: dom, hojaSeleccionada: null,
               tareas: [], respuestas: {}, operario: "", jefe: "",
               fechaInicio: "", fechaFin: "", observaciones: "",
               vista: "formulario" };
  }
  render();
}

function volver() {
  if (estado.vista === "admin") { estado.vista = "formulario"; estado.paso = 0; render(); return; }
  if (estado.paso <= 1) { volverModo(); return; }
  estado.paso = estado.paso - 1;
  render();
}

// ── helpers ──────────────────────────────────────────────────
function formatearDescripcion(texto) {
  if (!texto) return "";
  const norm = texto.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const idx  = norm.indexOf("\n");
  if (idx > 0) {
    return `<strong style="display:block;margin-bottom:6px;">${esc(norm.slice(0,idx).trim())}</strong>${esc(norm.slice(idx+1).trim()).replace(/\n/g,"<br>")}`;
  }
  return esc(norm);
}

function esc(str) {
  return String(str||"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── inicio ───────────────────────────────────────────────────
estado.paso = -1;
render();
</script>
